async function atDelete(p){const r=await fetch('https://api.airtable.com/v0/'+p,{method:'DELETE',headers:{Authorization:'Bearer '+S.token}});if(!r.ok)throw new Error('API '+r.status);return r.json()}
async function atGetAll(bid,tid,params={}){let all=[],off=null;do{let u=bid+'/'+tid+'?pageSize=100';if(off)u+='&offset='+encodeURIComponent(off);if(params.fields)params.fields.forEach(f=>u+='&fields%5B%5D='+encodeURIComponent(f));if(params.filter)u+='&filterByFormula='+encodeURIComponent(params.filter);const d=await atGet(u);all=all.concat(d.records||[]);off=d.offset||null}while(off);return all}

async function detectBase(bid,bn){const data=await atGet('meta/bases/'+bid+'/tables');const tables=data.tables||[];let r={baseId:bid,baseName:bn,tables:{}};for(const t of tables){const ns=(t.fields||[]).map(f=>f.name.toLowerCase().trim());const fm={};t.fields.forEach(f=>fm[f.name.toLowerCase().trim()]=f.id);if(ns.includes('prenom')&&ns.includes('nom')&&(ns.includes('patrouille')||ns.includes('patrol')))r.tables.members={id:t.id,name:t.name,fields:fm};if(ns.some(n=>n==='membre id'||n==='membre_id')&&ns.includes('reunion')&&ns.includes('presence'))r.tables.presence={id:t.id,name:t.name,fields:fm};if(ns.includes('badge')&&ns.includes('statut')&&ns.includes('categorie'))r.tables.badges={id:t.id,name:t.name,fields:fm};if(ns.includes('article')&&ns.includes('taille'))r.tables.commandes={id:t.id,name:t.name,fields:fm};if(ns.includes('type')&&ns.includes('montant')&&ns.includes('categorie')&&ns.includes('date')&&!r.tables.commandes?.id!==t.id)r.tables.finances={id:t.id,name:t.name,fields:fm}}return r}
async function detectMat(bid,bn){const data=await atGet('meta/bases/'+bid+'/tables');const tables=data.tables||[];let r={baseId:bid,baseName:bn,matTables:{}};for(const t of tables){const m=MAT_TABLES.find(mt=>t.name.toLowerCase().includes(mt.hint.toLowerCase()));if(m){const fm={};t.fields.forEach(f=>fm[f.name.toLowerCase().trim()]=f.id);r.matTables[m.key]={id:t.id,name:t.name,fields:fm}}}return r}
async function connect(){setState({loading:true,error:null,statusMsg:'Connexion...'});try{const data=await atGet('meta/bases');const bases=(data.bases||[]).map(b=>({id:b.id,name:b.name}));if(!bases.length)throw new Error('Aucune base.');setState({statusMsg:'Détection...'});let cfg={bases:{}};for(const b of bases){try{const info=await detectBase(b.id,b.name);if(info.tables.members)cfg.bases[b.id]={...info,type:'members'};const mi=await detectMat(b.id,b.name);if(Object.keys(mi.matTables).length>2)cfg.bases[b.id]={...(cfg.bases[b.id]||{}),...mi,type:cfg.bases[b.id]?.type==='members'?'both':'material'}}catch(e){}}let mb=null,mt=null;for(const[,info]of Object.entries(cfg.bases)){if(info.tables?.members&&!mb)mb=info;if(info.matTables&&Object.keys(info.matTables).length>0&&!mt)mt=info}if(!mb)throw new Error('Base membres non trouvée');const fc={membersBase:mb,matBase:mt};localStorage.setItem('scout_token',S.token);localStorage.setItem('scout_cfg',JSON.stringify(fc));setState({cfg:fc,statusMsg:'Chargement...'});await loadMembers();if(S.year)setState({screen:'home',loading:false,statusMsg:null});else setState({screen:'year_select',loading:false,statusMsg:null})}catch(e){setState({loading:false,statusMsg:null,error:e.message.includes('401')?'Token invalide.':'Erreur: '+e.message})}}

async function loadMembers(){const mb=S.cfg.membersBase;const recs=await atGetAll(mb.baseId,mb.tables.members.id,{fields:['ID','Prenom','Nom','Patrouille','Fonction','Promesse','Seconde Classe','Premiere Classe','Annee Scoute']});const members=recs.map(r=>{const f=r.fields||{};return{recordId:r.id,id:f['ID'],prenom:f['Prenom']||'',nom:f['Nom']||'',patrouille:selVal(f['Patrouille'])||'—',fonction:selVal(f['Fonction'])||'',promesse:!!f['Promesse'],secondeClasse:!!f['Seconde Classe'],premiereClasse:f['Premiere Classe']==='Yes',anneeScoute:selVal(f['Annee Scoute'])}}).filter(m=>m.id!=null).sort((a,b)=>a.patrouille!==b.patrouille?a.patrouille.localeCompare(b.patrouille):a.prenom.localeCompare(b.prenom));const att={};members.forEach(m=>att[m.id]=true);setState({members,att,reasons:{}})}
function getActiveMembers(){return S.members.filter(m=>!m.anneeScoute||m.anneeScoute===S.year)}
async function loadHistory(){setState({loadingHist:true});try{const mb=S.cfg.membersBase;if(!mb.tables.presence){setState({loadingHist:false});return}const recs=await atGetAll(mb.baseId,mb.tables.presence.id,{fields:['Membre ID','Presence','Absence','Annee Scoute'],filter:`{Annee Scoute}="${S.year}"`});const hist={};recs.forEach(r=>{const f=r.fields||{},mid=f['Membre ID'];if(mid==null)return;if(!hist[mid])hist[mid]={p:0,a:0};hist[mid].p+=(f['Presence']||0);hist[mid].a+=(f['Absence']||0)});setState({history:hist,loadingHist:false})}catch(e){setState({loadingHist:false})}}
async function loadProgress(mid){setState({loadingProgress:true});try{const mb=S.cfg.membersBase;if(!mb.tables.badges){setState({loadingProgress:false});return}const recs=await atGetAll(mb.baseId,mb.tables.badges.id,{fields:['Badge','Membre ID','Prenom Nom','Categorie','Statut','Date Obtenu','Notes'],filter:`{Membre ID}=${mid}`});const pr=recs.map(r=>({recordId:r.id,badge:r.fields['Badge']||'',categorie:selVal(r.fields['Categorie']),statut:selVal(r.fields['Statut'])||'Non commence',dateObtenu:r.fields['Date Obtenu']||null,notes:r.fields['Notes']||''}));setState({progressRecords:pr,loadingProgress:false})}catch(e){setState({progressRecords:[],loadingProgress:false})}}
async function loadMaterial(){setState({matLoading:true});try{const mb=S.cfg.matBase;if(!mb){setState({matLoading:false});return}const data={};for(const mt of MAT_TABLES){const tbl=mb.matTables[mt.key];if(!tbl)continue;try{const recs=await atGetAll(mb.baseId,tbl.id);data[mt.key]=recs.map(r=>{const f=r.fields||{};return{recordId:r.id,name:selVal(f['Product Type'])||'—',qty:f['Quantity']||0,status:selVal(f['Status']||f['status'])||'',desc:f['Brief Description']||''}})}catch(e){data[mt.key]=[]}}setState({matData:data,matLoading:false})}catch(e){setState({matLoading:false})}}
async function loadOrders(){setState({ordersLoading:true});try{const mb=S.cfg.membersBase;if(!mb.tables.commandes){setState({ordersLoading:false});return}const recs=await atGetAll(mb.baseId,mb.tables.commandes.id,{fields:['Description','Membre ID','Prenom Nom','Article','Taille','Quantite','Statut','Date Commande','Annee Scoute','Badge Nom','Prix Unitaire','Paye','Livre au membre','Montant Paye'],filter:`{Annee Scoute}="${S.year}"`});const orders=recs.map(r=>{const f=r.fields||{};return{recordId:r.id,membreId:f['Membre ID'],nom:f['Prenom Nom']||'',article:selVal(f['Article']),taille:selVal(f['Taille']),qty:f['Quantite']||1,statut:selVal(f['Statut']),date:f['Date Commande']||'',badgeName:f['Badge Nom']||'',prix:f['Prix Unitaire']||0,paye:selVal(f['Paye'])||'Non paye',livre:selVal(f['Livre au membre'])||'Non livre',montantPaye:f['Montant Paye']||0}});setState({orders,ordersLoading:false})}catch(e){setState({ordersLoading:false})}}
async function loadFinances(){setState({finLoading:true});try{const mb=S.cfg.membersBase;if(!mb.tables.finances){setState({finLoading:false});return}const recs=await atGetAll(mb.baseId,mb.tables.finances.id,{fields:['Description','Type','Montant','Date','Membre ID','Prenom Nom','Annee Scoute','Categorie'],filter:`{Annee Scoute}="${S.year}"`});const finTx=recs.map(r=>{const f=r.fields||{};return{recordId:r.id,desc:f['Description']||'',type:selVal(f['Type']),montant:f['Montant']||0,date:f['Date']||'',membreId:f['Membre ID'],nom:f['Prenom Nom']||'',cat:selVal(f['Categorie'])}});setState({finTx,finLoading:false})}catch(e){setState({finLoading:false})}}

async function submitAttendance(){setState({submitting:true,progress:0,error:null});try{const mb=S.cfg.membersBase,am=getActiveMembers(),bs=10,total=Math.ceil(am.length/bs);let done=0;for(let i=0;i<am.length;i+=bs){const chunk=am.slice(i,i+bs);const records=chunk.map(m=>({fields:{'Membre ID':parseInt(m.id),'Reunion':S.meetDate,'Presence':S.att[m.id]?1:0,'Absence':S.att[m.id]?0:1,'Annee Scoute':S.year,...((!S.att[m.id]&&S.reasons[m.id])?{'why?':S.reasons[m.id]}:{})}}));await atPost(mb.baseId+'/'+mb.tables.presence.id,{records,typecast:true});done++;setState({progress:Math.round(done/total*100)})}const v=am.map(m=>S.att[m.id]);setState({savedStats:{p:v.filter(Boolean).length,a:v.filter(x=>!x).length},screen:'att_success',submitting:false})}catch(e){setState({error:'Erreur: '+e.message,submitting:false})}}

async function toggleFormStep(sn,er){const m=S.selectedMember;if(!m)return;setState({savingStep:sn});const cur=er?.statut||'Non commence',next=cur==='Non commence'?'En cours':cur==='En cours'?'Obtenu':'Non commence';try{const mb=S.cfg.membersBase;if(er?.recordId){const fields={'Statut':next};if(next==='Obtenu')fields['Date Obtenu']=new Date().toISOString().split('T')[0];if(next==='Non commence')fields['Date Obtenu']=null;await atPatch(mb.baseId+'/'+mb.tables.badges.id,{records:[{id:er.recordId,fields}],typecast:true});setState({savingStep:null,progressRecords:S.progressRecords.map(r=>r.recordId===er.recordId?{...r,statut:next,dateObtenu:next==='Obtenu'?new Date().toISOString().split('T')[0]:null}:r)})}else{let cat='Spiritualite';for(const[cn,badges]of Object.entries(BADGE_CATEGORIES)){if(badges.includes(sn)){const map={'Vie Chrétienne':'Spiritualite','Arts et Expression':'Expression','Connaissance & Découverte':'Civisme','Sport':'Sport','Vie dans la Nature':'Nature','Santé et Sécurité':'Secourisme','Monde Numérique':'Technique','Technique':'Technique'};cat=map[cn]||'Technique';break}}const res=await atPost(mb.baseId+'/'+mb.tables.badges.id,{records:[{fields:{'Badge':sn,'Membre ID':m.id,'Prenom Nom':`${m.prenom} ${m.nom}`,'Categorie':cat,'Statut':next,'Annee Scoute':S.year,...(next==='Obtenu'?{'Date Obtenu':new Date().toISOString().split('T')[0]}:{})}}],typecast:true});const nr=res.records?.[0];if(nr)setState({savingStep:null,progressRecords:[...S.progressRecords,{recordId:nr.id,badge:sn,categorie:cat,statut:next,dateObtenu:next==='Obtenu'?new Date().toISOString().split('T')[0]:null,notes:''}]});else setState({savingStep:null})}}catch(e){setState({savingStep:null})}}

async function submitOrder(){setState({orderSaving:true,error:null});try{const mb=S.cfg.membersBase,m=getActiveMembers().find(x=>x.id===parseInt(S.orderMember));if(!m)throw new Error('Sélectionnez un membre');if(!S.orderArticle)throw new Error('Sélectionnez un article');const prix=S.orderPrix!==''?parseFloat(S.orderPrix):(ARTICLE_PRICES[S.orderArticle]||0);const fields={'Description':`${S.orderArticle} - ${m.prenom} ${m.nom}`,'Membre ID':m.id,'Prenom Nom':`${m.prenom} ${m.nom}`,'Article':S.orderArticle,'Quantite':S.orderQty||1,'Statut':'En attente','Date Commande':new Date().toISOString().split('T')[0],'Annee Scoute':S.year,'Paye':'Non paye','Livre au membre':'Non livre','Prix Unitaire':prix};if(S.orderTaille)fields['Taille']=S.orderTaille;if(S.orderBadgeName)fields['Badge Nom']=S.orderBadgeName;if(S.orderNotes)fields['Notes']=S.orderNotes;await atPost(mb.baseId+'/'+mb.tables.commandes.id,{records:[{fields}],typecast:true});setState({orderSaving:false,screen:'orders',orderMember:null,orderArticle:'',orderTaille:'',orderQty:1,orderBadgeName:'',orderNotes:'',orderPrix:''});loadOrders()}catch(e){setState({error:e.message,orderSaving:false})}}
async function updateOrderField(rid,field,value){try{const mb=S.cfg.membersBase;await atPatch(mb.baseId+'/'+mb.tables.commandes.id,{records:[{id:rid,fields:{[field]:value}}],typecast:true});loadOrders()}catch(e){console.error(e)}}
async function addMatItem(key,name,qty,status){try{const mb=S.cfg.matBase,tbl=mb.matTables[key];if(!tbl)return;await atPost(mb.baseId+'/'+tbl.id,{records:[{fields:{'Product Type':name,'Quantity':parseInt(qty)||1,'Status':status||'Local'}}],typecast:true});setState({modal:null});loadMaterial()}catch(e){console.error(e)}}
async function removeMatItem(key,rid){try{const mb=S.cfg.matBase,tbl=mb.matTables[key];if(!tbl)return;await atDelete(mb.baseId+'/'+tbl.id+'?records[]='+rid);loadMaterial()}catch(e){console.error(e)}}
async function submitFinTx(){setState({finSaving:true,error:null});try{const mb=S.cfg.membersBase;if(!mb.tables.finances)throw new Error('Table finances non trouvée');const t=document.getElementById('fin-type').value,m=document.getElementById('fin-montant').value,d=document.getElementById('fin-desc').value,c=document.getElementById('fin-cat').value,mem=document.getElementById('fin-member').value;const fields={'Description':d,'Type':t,'Montant':parseFloat(m)||0,'Date':new Date().toISOString().split('T')[0],'Annee Scoute':S.year};if(c)fields['Categorie']=c;if(mem){const mm=getActiveMembers().find(x=>x.id===parseInt(mem));if(mm){fields['Membre ID']=mm.id;fields['Prenom Nom']=`${mm.prenom} ${mm.nom}`}}await atPost(mb.baseId+'/'+mb.tables.finances.id,{records:[{fields}],typecast:true});setState({finSaving:false,modal:null});loadFinances()}catch(e){setState({error:e.message,finSaving:false})}}

function getStepStatus(n){const r=S.progressRecords.find(x=>x.badge===n);return{status:r?.statut||'Non commence',record:r||null}}
function countObtenu(s){return s.filter(x=>getStepStatus(x).status==='Obtenu').length}function getBadgesEarned(){return countObtenu(Object.values(BADGE_CATEGORIES).flat())}function isPromesseDone(){return S.selectedMember?.promesse||countObtenu(PROMESSE_STEPS)===PROMESSE_STEPS.length}function isSecondeDone(){return S.selectedMember?.secondeClasse}
function getFilteredMembers(fk,sk){let l=getActiveMembers();const f=S[fk],q=S[sk];if(f&&f!=='all'&&f!=='Tous')l=l.filter(m=>m.patrouille===f);if(q?.trim()){const lq=q.toLowerCase();l=l.filter(m=>(m.prenom+' '+m.nom).toLowerCase().includes(lq))}return l}
function getPatrols(){return[...new Set(getActiveMembers().map(m=>m.patrouille))].filter(p=>p!=='—').sort()}
const svgBack=`<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,svgSearch=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`,svgChevron=`<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 3L11 8L6 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,svgCheck=`<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5L6.5 11.5L12.5 4.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,svgLock=`<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
function progressRingSvg(p,c,sz=44,sw=4){const r=(sz-sw)/2,ci=2*Math.PI*r,o=ci*(1-p);return`<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--border-light)" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-dasharray="${ci}" stroke-dashoffset="${o}" stroke-linecap="round" style="transition:stroke-dashoffset .5s ease"/></svg>`}
function modHeader(t,sub,bk){return`<div class="mod-header"><div class="mod-back" onclick="goTo('${bk}')">${svgBack}</div><div><div class="mod-title">${esc(t)}</div>${sub?`<div class="mod-sub">${esc(sub)}</div>`:''}</div></div>`}

function render(){document.getElementById('root').setAttribute('data-theme',S.theme);const app=document.getElementById('app');let h='';
  switch(S.screen){case 'setup':h=rSetup();break;case 'year_select':h=rYear();break;case 'home':h=rHome();break;case 'attendance':h=rAtt();break;case 'att_history':h=rAttHist();break;case 'att_success':h=rAttOk();break;case 'formation':h=rFormList();break;case 'form_profile':h=rFormProf();break;case 'form_pillar':h=rFormPillar();break;case 'material':h=rMat();break;case 'orders':h=rOrders();break;case 'order_form':h=rOrderForm();break;case 'finance':h=rFin();break;case 'member_orders':h=rMemOrders();break;case 'troupe_setup':h=rSetupTroupe();break;default:h=rHome()}
  app.innerHTML=h+(S.modal?`<div class="modal-overlay" onclick="setState({modal:null})"><div class="modal" onclick="event.stopPropagation()">${S.modal}</div></div>`:'')}

function rSetup(){return`<div class="setup"><div class="setup-icon">⚜</div><h1>Scout Manager</h1><p>Connectez votre Airtable pour gérer votre troupe.</p><input type="password" id="tok" placeholder="Personal Access Token" value="${esc(S.token)}" onkeydown="if(event.key==='Enter')doConnect()" oninput="S.token=this.value">${S.error?`<div class="error-msg">${esc(S.error)}</div>`:''}${S.statusMsg?`<div class="status-msg">${esc(S.statusMsg)}</div>`:''}${S.loading?'<div class="spinner" style="margin:0 auto"></div>':''}<button class="btn btn-primary" onclick="doConnect()" ${S.loading?'disabled':''}>${S.loading?'Connexion...':'Se connecter'}</button><div class="hint-box"><strong>Comment obtenir votre token:</strong><br>1. <a href="https://airtable.com/create/tokens" target="_blank">airtable.com/create/tokens</a><br>2. Scopes: <code>data.records:read</code> + <code>data.records:write</code> + <code>schema.bases:read</code><br>3. Accès: ajoutez vos bases</div><div style="display:flex;align-items:center;gap:8px;margin-top:8px"><span style="font-size:12px;color:var(--text3)">Thème:</span><div class="theme-toggle" onclick="toggleTheme()">${S.theme==='dark'?'☀️':'🌙'}</div></div></div>`}
function rYear(){const cy=new Date().getFullYear();const yrs=[];for(let y=cy-2;y<=cy+1;y++)yrs.push(`${y}-${y+1}`);return`<div class="setup"><div class="setup-icon">📅</div><h1>Année scoute</h1><p>Sélectionnez l'année en cours.</p><select id="yearsel" onchange="S.year=this.value"><option value="">— Choisir —</option>${yrs.map(y=>`<option value="${y}" ${S.year===y?'selected':''}>${y}</option>`).join('')}</select><button class="btn btn-primary" onclick="doSelectYear()">Continuer</button><button class="btn btn-outline btn-sm" onclick="doLogout()">← Retour</button></div>`}

function rAtt(){const am=getActiveMembers(),ps=getPatrols(),fl=getFilteredMembers('attFilter','attSearch'),pCnt=am.filter(m=>S.att[m.id]).length,aCnt=am.length-pCnt;return`<div class="fade-in">${modHeader('Présence',fmtDate(S.meetDate),'home')}<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap"><input type="date" style="padding:8px 12px;background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font);font-size:14px;outline:none;color-scheme:${S.theme}" value="${S.meetDate}" onchange="S.meetDate=this.value"><button class="btn btn-sm btn-outline" onclick="setState({screen:'att_history'});loadHistory()">📊 Totaux</button><div style="margin-left:auto;display:flex;gap:6px"><div class="stat-box" style="padding:6px 12px"><div class="num" style="color:var(--accent);font-size:16px">${pCnt}</div><div class="lbl">P</div></div><div class="stat-box" style="padding:6px 12px"><div class="num" style="color:var(--danger);font-size:16px">${aCnt}</div><div class="lbl">A</div></div></div></div><div class="filters"><span class="chip ${S.attFilter==='all'?'active':''}" onclick="setState({attFilter:'all'})">Tous (${am.length})</span>${ps.map(p=>`<span class="chip ${S.attFilter===p?'active':''}" style="${S.attFilter===p?'background:'+patColor(p)+';border-color:'+patColor(p)+';color:#fff':''}" onclick="setState({attFilter:'${esc(p)}'})">${PAT_ICONS[p]||''} ${esc(p)}</span>`).join('')}</div><div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap"><div class="search-bar" style="flex:1;min-width:160px;margin-bottom:0">${svgSearch}<input placeholder="Rechercher..." value="${esc(S.attSearch)}" oninput="setState({attSearch:this.value})"></div><button class="btn btn-sm" style="background:var(--accent-bg);color:var(--accent)" onclick="markAll(true)">✓</button><button class="btn btn-sm" style="background:var(--danger-bg);color:var(--danger)" onclick="markAll(false)">✗</button></div><div style function rFormList(){const fl=getFilteredMembers('formFilter','formSearch'),groups={};fl.forEach(m=>{const p=m.patrouille||'—';if(!groups[p])groups[p]=[];groups[p].push(m)});const sk=Object.keys(groups).sort((a,b)=>{const ai=PATROUILLES.indexOf(a),bi=PATROUILLES.indexOf(b);return(ai===-1?99:ai)-(bi===-1?99:bi)});return`<div class="fade-in">${modHeader('Formation',getActiveMembers().length+' scouts','home')}<div class="search-bar">${svgSearch}<input placeholder="Rechercher..." value="${esc(S.formSearch)}" oninput="setState({formSearch:this.value})"></div><div class="filters">${['Tous',...PATROUILLES].map(p=>`<span class="chip ${S.formFilter===p?'active':''}" style="${S.formFilter===p&&p!=='Tous'?'background:'+patColor(p)+';border-color:'+patColor(p)+';color:#fff':''}" onclick="setState({formFilter:'${esc(p)}'})">${p!=='Tous'?(PAT_ICONS[p]||'')+' ':''}${esc(p)}</span>`).join('')}</div>${sk.map(pat=>`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:0 4px"><div style="width:10px;height:10px;border-radius:50%;background:${patColor(pat)}"></div><span style="font-weight:500;font-size:14px;flex:1">${PAT_ICONS[pat]||'⚜'} ${esc(pat)}</span><span style="font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:10px">${groups[pat].length}</span></div>${groups[pat].sort((a,b)=>a.prenom.localeCompare(b.prenom)).map(m=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:background .12s" onmouseenter="this.style.background='var(--bg-hover)'" onmouseleave="this.style.background=''" onclick="selectFormMember(${m.id})"><div class="avatar" style="background:${patColor(m.patrouille)}">${esc((m.prenom[0]||'')+(m.nom[0]||''))}</div><span style="font-size:14px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(m.prenom)} ${esc(m.nom)}</span><div style="display:flex;gap:3px">${m.pro function rFormProf(){const m=S.selectedMember;if(!m)return'';if(S.loadingProgress)return`<div class="fade-in">${modHeader(m.prenom+' '+m.nom,'','formation')}<div class="loading"><div class="spinner"></div><span class="loading-text">Chargement...</span></div></div>`;const pd=countObtenu(PROMESSE_STEPS),pp=pd/PROMESSE_STEPS.length,allS=Object.values(SECONDE_SECTIONS).flat(),sd=countObtenu(allS),sb=Math.min(getBadgesEarned(),5),sp=(sd+sb)/(allS.length+5),psd=Object.entries(PREMIERE_SECTIONS).reduce((a,[,s])=>a+Math.min(countObtenu(s),3),0),ptr=Object.keys(PREMIERE_SECTIONS).length*3,pe=Math.min(Math.max(getBadgesEarned()-5,0),5),prp=(psd+pe)/(ptr+5),be=getBadgesEarned(),bp=be/TOTAL_BADGES,pc=m.promesse||pp===1,sc=m.secondeClasse||sp>=1,prc=m.premiereClasse;function pC(n,sub,pct,col,comp,lock,key){return`<div class="menu-card" style="${comp?'border-color:'+col+';border-width:2px':''}${lock?';opacity:.45;cursor:default':''}" onclick="${lock?'':`goToPillar('${key}')`}">${comp?`<div style="position:absolute;top:0;right:0;font-size:9px;font-weight:600;padding:3px 10px;border-radius:0 0 0 8px;color:#fff;background:${col}">✓</div>`:''}${lock?`<div style="position:absolute;top:10px;right:10px;color:var(--text3)">${svgLock}</div>`:''}<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><div style="position:relative;width:44px;height:44px;flex-shrink:0">${progressRingSvg(pct,col)}<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:${col}">${Math.round(pct*100)}%</div></div><div><div style="font-size:14px;font-weight:500">${n}</div><div style="font-size:11px;color:var(--text3)">${sub}</div></div></div>${!lock?`<div style="height:4px;border-radius:2px;background:var(--border-light);overflow:hidden"><div style="height:100%;border-radius:2px;width:${Math.round(pct*100)}%;background:${col};transition:width .5s"></div></div>`:''}</div>`}return`<div class="fade-in">${modHeader(m.prenom+' '+m.nom,'Patrouille '+m.patrouille,'formation')}<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px"><div class="avatar" style="width:52px;height:52px;font-size:22px;background:${patColor(m.patrouille)}">${PAT_ICONS[m.patrouille]||'⚜'}</div><div><div style="font-family:var(--font-display);font-size:20px;font-weight:500">${esc(m.prenom)} ${esc(m.nom)}</div><div style="font-size:13px;color:var(--text2)">${PAT_ICONS[m.patrouille]||''} ${esc(m.patrouille)}</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${pC('Promesse',`${pd}/${PROMESSE_STEPS.length}`,pp,'var(--purple)',pc,false,'promesse')}${pC('2nde classe',`${sd}/24 + ${sb}/5`,sp,'var(--info)',sc,!pc,'seconde')}${pC('1ère classe',`${psd}/${ptr} + ${pe}/5`,prp,'var(--danger)',prc,!sc,'premiere')}${pC('Badges',`${be}/${TOTAL_BADGES}`,bp,'#1a7a6a',false,false,'badges')}</div></div>`}

function rFormPillar(){const m=S.selectedMember,p=S.activePillar;if(!m||!p)return'';const titles={promesse:'Promesse',seconde:'Seconde classe',premiere:'Première classe',badges:'Badges'},colors={promesse:'var(--purple)',seconde:'var(--info)',premiere:'var(--danger)',badges:'#1a7a6a'};function sR(sn,lock){const{status}=getStepStatus(sn);let c='';if(status==='Obtenu')c=`<div style="width:22px;height:22px;border-radius:50%;background:var(--accent);color:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0">${svgCheck}</div>`;else if(status==='En cours')c=`<div style="width:22px;height:22px;border-radius:50%;border:2px solid var(--warn);background:var(--warn-bg);color:var(--warn);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700">~</div>`;else c=`<div style="width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0"></div>`;return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);cursor:${lock?'default':'pointer'};opacity:${lock?.4:1}" ${lock?'':`onclick="doToggleStep(\`${sn.replace(/`/g,'')}\`)"`}>${c}<span style="font-size:13px;flex:1;${status==='Obtenu'?'color:var(--accent);font-weight:500':''}">${esc(sn)}</span>${S.savingStep===sn?'<span style="font-size:10px;color:var(--text3)">...</span>':''}</div>`}function sA(sn,steps,lock){const d=countObtenu(steps),t=steps.length,io=!!S.openSections[sn];return`<div style="border-bottom:1px solid var(--border-light)"><div style="display:flex;align-items:center;gap:8px;padding:12px 4px;cursor:pointer;user-select:none" onclick="toggleSection(\`${sn.replace(/`/g,'')}\`)"><div style="transition:transform .2s;color:var(--text3);flex-shrink:0;${io?'transform:rotate(90deg)':''}">${svgChevron}</div><span style="flex:1;font-weight:500;font-size:14px">${esc(sn)}</span><span style="font-size:11px;padding:2px 9px;border-radius:10px;font-weight:500;${d===t?'background:var(--accent-bg);color:var(--accent)':'background:var(--bg3);color:var(--text2)'}">${d}/${t}</span></div>${io?steps.map(s=>sR(s,lock)).join(''):''}</div>`}let ct='';if(p==='promesse'){ct=`<div style="font-size:13px;color:var(--text2);margin-bottom:14px">${countObtenu(PROMESSE_STEPS)}/${PROMESSE_STEPS.length} étapes</div>`+PROMESSE_STEPS.map(s=>sR(s,false)).join('')}else if(p==='seconde'){const lock=!isPromesseDone();if(lock)ct+=`<div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:var(--radius);background:var(--warn-bg);color:var(--warn);font-size:13px;margin-bottom:14px">${svgLock} Promesse requise</div>`;ct+=Object.entries(SECONDE_SECTIONS).map(([n,s])=>sA(n,s,lock)).join('')}else if(p==='premiere'){const lock=!isSecondeDone();if(lock)ct+=`<div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:var(--radius);background:var(--warn-bg);color:var(--warn);font-size:13px;margin-bottom:14px">${svgLock} 2nde classe requise</div>`;ct+=Object.entries(PREMIERE_SECTIONS).map(([n,s])=>sA(n,s,lock)).join('')}else if(p==='badges'){ct+=`<div style="text-align:center;margin-bottom:20px"><div style="font-family:var(--font-display);font-size:36px;font-weight:700;color:#1a7a6a">${getBadgesEarned()}/${TOTAL_BADGES}</div><div style="font-size:13px;color:var(--text2)">badges obtenus</div></div>`;ct+=Object.entries(BADGE_CATEGORIES).map(([cat,badges])=>{const ce=countObtenu(badges);return`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="width:9px;height:9px;border-radius:50%;background:${CAT_COLORS[cat]}"></div><span style="font-weight:500;font-size:13px;flex:1">${esc(cat)}</span><span style="font-size:11px;color:var(--text3)">${ce}/${badges.length}</span></div><div style="display:flex;flex-wrap:wrap;gap:5px">${badges.map(b=>{const{status}=getStepStatus(b);let st=status==='Obtenu'?'background:var(--accent-bg);color:var(--accent);border-color:var(--accent)':status==='En cours'?'background:var(--warn-bg);color:var(--warn);border-color:var(--warn)':'';return`<span style="font-size:11px;padding:4px 10px;border-radius:8px;cursor:pointer;border:1px solid var(--border-light);${st};user-select:none" onclick="doToggleStep(\`${b.replace(/`/g,'')}\`)">${status==='Obtenu'?'✓ ':status==='En cours'?'~ ':''}${esc(b)}${S.savingStep===b?' ...':''}</span>`}).join('')}</div></div>`}).join('')}return`<div class="fade-in">${modHeader(titles[p],m.prenom+' '+m.nom,'form_profile')}<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px"><div style="width:6px;height:28px;border-radius:3px;background:${colors[p]}"></div><div style="font-family:var(--font-display);font-size:20px;font-weight:500">${titles[p]}</div></div>${ct}</div>`}

function rOrders(){if(S.ordersLoading)return`<div class="fade-in">${modHeader('Commandes','','home')}<div class="loading"><div class="spinner"></div><span class="loading-text">Chargement...</span></div></div>`;return`<div class="fade-in">${modHeader('Commandes '+S.year,'','home')}<button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:16px" onclick="setState({screen:'order_form',error:null})">+ Nouvelle commande</button>${S.orders.length===0?'<div class="empty-state"><span class="e-icon">👕</span>Aucune commande.</div>':''}${S.orders.map(o=>{const sC=o.statut==='Livre'?'var(--accent)':o.statut==='Commande'?'var(--info)':'var(--warn)',pC=o.paye==='Paye'?'var(--accent)':o.paye==='Partiellement'?'var(--warn)':'var(--danger)',lC=o.livre==='Livre'?'var(--accent)':'var(--danger)';return`<div class="order-card"><div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-weight:600;font-size:13px">${esc(o.article)}${o.taille?' · '+esc(o.taille):''}${o.badgeName?' · '+esc(o.badgeName):''}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${esc(o.nom)} · ×${o.qty}${o.prix?' · '+fmtMoney(o.prix*o.qty):''}${o.date?' · '+fmtDate(o.date):''}</div></div></div><div class="order-pills"><span class="pill" style="background:${sC}15;color:${sC};cursor:pointer" onclick="cycleStatus('${o.recordId}','${o.statut}')">${esc(o.statut||'En attente')}</span><span class="pill" style="background:${pC}15;color:${pC};cursor:pointer" onclick="cyclePaye('${o.recordId}','${o.paye}')">${esc(o.paye)}</span><span class="pill" style="background:${lC}15;color:${lC};cursor:pointer" onclick="cycleLivre('${o.recordId}','${o.livre}')">${esc(o.livre)}</span></div></div>`}).join('')}</div>`}
function rOrderForm(){const ns=['Short','Chemise','T-shirt blanc','T-shirt navy'].includes(S.orderArticle),ib=S.orderArticle==='Badge';const autoP=ARTICLE_PRICES[S.orderArticle]||'';const dispP=S.orderPrix!==''?S.orderPrix:autoP;return`<div class="fade-in">${modHeader('Nouvelle commande','','orders')}<div class="form-group"><label>Scout</label><select onchange="setState({orderMember:this.value})"><option value="">— Sélectionner —</option>${getActiveMembers().map(m=>`<option value="${m.id}" ${S.orderMember==m.id?'selected':''}>${esc(m.prenom)} ${esc(m.nom)} (${esc(m.patrouille)})</option>`).join('')}</select></div><div class="form-group"><label>Article</label><select onchange="selectArticle(this.value)"><option value="">— Sélectionner —</option>${ARTICLES.map(a=>`<option value="${esc(a)}" ${S.orderArticle===a?'selected':''}>${esc(a)} — $${ARTICLE_PRICES[a]||0}</option>`).join('')}</select></div>${ns?`<div class="form-group"><label>Taille</label><select onchange="setState({orderTaille:this.value})"><option value="">— Taille —</option>${TAILLES.map(t=>`<option value="${t}" ${S.orderTaille===t?'selected':''}>${t}</option>`).join('')}</select></div>`:''}${ib?`<div class="form-group"><label>Nom du badge</label><input placeholder="Ex: Premiers Soins" value="${esc(S.orderBadgeName)}" oninput="setState({orderBadgeName:this.value})"></div>`:''}<div class="form-group"><label>Quantité</label><input type="number" min="1" value="${S.orderQty}" oninput="setState({orderQty:parseInt(this.value)||1})"></div><div class="form-group"><label>Prix unitaire ($)</label><input type="number" step="0.01" placeholder="0.00" value="${dispP}" oninput="setState({orderPrix:this.value})"></div>${dispP&&S.orderQty>0?`<div style="text-align:right;font-size:13px;color:var(--accent);font-weight:600;margin-top:-6px;margin-bottom:12px">Total: ${fmtMoney(dispP*S.orderQty)}</div>`:''}<div class="form-group"><label>Notes</label><input placeholder="Notes..." value="${esc(S.orderNotes)}" oninput="setState({orderNotes:this.value})"></div>${S.error?`<div class="error-msg">${esc(S.error)}</div>`:''}<button class="btn btn-primary" style="width:100%;justify-content:center" onclick="submitOrder()" ${S.orderSaving?'disabled':''}>${S.orderSaving?'Envoi...':'Soumettre'}</button></div>`}

function rFin(){if(S.finLoading)return`<div class="fade-in">${modHeader('Finances','','home')}<div class="loading"><div class="spinner"></div><span class="loading-text">Chargement...</span></div></div>`;const ent=S.finTx.filter(t=>t.type!=='Sortie').reduce((s,t)=>s+t.montant,0),sor=S.finTx.filter(t=>t.type==='Sortie').reduce((s,t)=>s+t.montant,0),bal=ent-sor,tDue=S.orders.reduce((s,o)=>s+(o.prix*o.qty)||0,0),tPaid=S.orders.reduce((s,o)=>s+(o.montantPaye||0),0);return`<div class="fade-in">${modHeader('Finances '+S.year,'Caisse','home')}<div class="fin-balance" style="background:var(--card-bg);border:1.5px solid var(--border-light);border-radius:var(--radius-lg)"><div style="font-size:12px;color:var(--text3);text-transform:uppercase;font-weight:600;letter-spacing:.04em;margin-bottom:4px">Solde de la caisse</div><span style="color:${bal>=0?'var(--accent)':'var(--danger)'}">${fmtMoney(bal)}</span></div><div class="stat-row"><div class="stat-box"><div class="num" style="color:var(--accent);font-size:16px">${fmtMoney(ent)}</div><div class="lbl">Entrées</div></div><div class="stat-box"><div class="num" style="color:var(--danger);font-size:16px">${fmtMoney(sor)}</div><div class="lbl">Sorties</div></div><div class="stat-box"><div class="num" style="color:var(--warn);font-size:16px">${fmtMoney(tDue-tPaid)}</div><div class="lbl">Dettes</div></div></div><button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:16px" onclick="showAddFin()">+ Transaction</button><div class="fin-card"><h3>Transactions</h3>${S.finTx.length===0?'<div style="text-align:center;color:var(--text3);font-size:13px;padding:12px">Aucune</div>':''}${S.finTx.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(t=>{const isIn=t.type!=='Sortie';return`<div class="fin-tx"><div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:${isIn?'var(--accent-bg)':'var(--danger-bg)'}">${isIn?'↓':'↑'}</div><div style="flex:1;min-width:0"><div style="font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.desc)}</div><div style="font-size:11px;color:var(--text3)">${t.cat?esc(t.cat)+' · ':''}${fmtDate(t.date)}${t.nom?' · '+esc(t.nom):''}</div></div><span class="fin-tx-amount" style="color:${isIn?'var(--accent)':'var(--danger)'}">${isIn?'+':'−'}${fmtMoney(t.montant)}</span></div>`}).join('')}</div></div>`}

function rMemOrders(){const am=getActiveMembers(),md={};S.orders.forEach(o=>{const mid=o.membreId;if(!mid)return;if(!md[mid])md[mid]={nom:o.nom,total:0,paid:0,orders:[]};md[mid].total+=(o.prix*o.qty)||0;md[mid].paid+=(o.montantPaye||0);md[mid].orders.push(o)});const dl=Object.entries(md).map(([mid,d])=>({mid:parseInt(mid),...d,owed:d.total-d.paid})).sort((a,b)=>b.owed-a.owed);return`<div class="fade-in">${modHeader('Comptes '+S.year,'Dettes & livraisons','home')}${dl.length===0?'<div class="empty-state"><span class="e-icon">👤</span>Aucune commande.</div>':''}${dl.map(d=>{const m=am.find(x=>x.id===d.mid),co=m?patColor(m.patrouille):'#888',allP=d.owed<=0,allD=d.orders.every(o=>o.livre==='Livre');return`<div class="fin-card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${m?`<div class="avatar" style="width:32px;height:32px;font-size:11px;background:${co}">${(m.prenom[0]||'')+(m.nom[0]||'')}</div>`:''}<div style="flex:1"><div style="font-weight:600;font-size:14px">${esc(d.nom)}</div><div style="font-size:11px;color:var(--text3)">${d.orders.length} commande${d.orders.length>1?'s':''}</div></div><div style="text-align:right"><div style="font-family:var(--font-mono);font-weight:700;font-size:14px;color:${allP?'var(--accent)':'var(--danger)'}">${allP?'Soldé':fmtMoney(d.owed)}</div><div style="font-size:10px;color:var(--text3)">${allD?'✓ Livré':'En attente'}</div></div></div>${d.orders.map(o=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--border-light);font-size:12px"><span style="flex:1">${esc(o.article)}${o.taille?' '+esc(o.taille):''} ×${o.qty}</span><span class="pill" style="background:${o.paye==='Paye'?'var(--accent-bg)':o.paye==='Partiellement'?'var(--warn-bg)':'var(--danger-bg)'};color:${o.paye==='Paye'?'var(--accent)':o.paye==='Partiellement'?'var(--warn)':'var(--danger)'}">${esc(o.paye)}</span><span class="pill" style="background:${o.livre==='Livre'?'var(--accent-bg)':'var(--danger-bg)'};color:${o.livre==='Livre'?'var(--accent)':'var(--danger)'}">${esc(o.livre)}</span></div>`).join('')}</div>`}).join('')}</div>`}

${ms.map(m=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--border-light);font-size:13px"><div class="avatar" style="width:28px;height:28px;font-size:10px;background:${patColor(pat)}">${(m.prenom[0]||'')+(m.nom[0]||'')}</div><span style="flex:1;font-weight:500">${esc(m.prenom)} ${esc(m.nom)}</span>${m.fonction?`<span class="pill" style="background:${m.fonction==='CP'?'var(--purple-bg)':'var(--info-bg)'};color:${m.fonction==='CP'?'var(--purple)':'var(--info)'}">${esc(m.fonction)}</span>`:''}
<select style="padding:4px 8px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text);font-family:var(--font)" onchange="setMemberRole('${m.recordId}',this.value)"><option value="" ${!m.fonction?'selected':''}>Scout</option><option value="CP" ${m.fonction==='CP'?'selected':''}>CP</option><option value="SP" ${m.fonction==='SP'?'selected':''}>SP</option></select>
<select style="padding:4px 8px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text);font-family:var(--font)" onchange="setMemberPatrol('${m.recordId}',this.value)">${PATROUILLES.map(p=>`<option value="${esc(p)}" ${m.patrouille===p?'selected':''}>${PAT_ICONS[p]} ${esc(p)}</option>`).join('')}</select></div>`).join('')}
<button class="btn btn-sm btn-outline" style="width:100%;justify-content:center;margin-top:8px" onclick="showTransferModal('${esc(pat)}')">+ Transférer un scout</button></div>`}).join('')}
<div class="fin-card"><h3>🔄 Activer des scouts pour ${esc(S.year)}</h3><p style="font-size:12px;color:var(--text2);margin-bottom:10px">Scouts sans année ou d'une autre année. Cliquez pour les activer dans ${esc(S.year)}.</p>

${allM.filter(m=>!m.anneeScoute||m.anneeScoute!==S.year).map(m=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--border-light);font-size:13px"><span style="flex:1;font-weight:500">${esc(m.prenom)} ${esc(m.nom)}</span><span style="font-size:11px;color:var(--text3)">${esc(m.patrouille)} ${m.anneeScoute?'· '+esc(m.anneeScoute):''}</span><button class="btn btn-sm" style="background:var(--accent-bg);color:var(--accent);padding:4px 12px" onclick="activateMember('${m.recordId}')">Activer</button></div>`).join('')}
</div></div>`}

async function setMemberRole(rid,role){try{const mb=S.cfg.membersBase;await atPatch(mb.baseId+'/'+mb.tables.members.id,{records:[{id:rid,fields:{'Fonction':role||''}}],typecast:true});S.members=S.members.map(m=>m.recordId===rid?{...m,fonction:role}:m);render()}catch(e){console.error(e)}}
async function setMemberPatrol(rid,pat){try{const mb=S.cfg.membersBase;await atPatch(mb.baseId+'/'+mb.tables.members.id,{records:[{id:rid,fields:{'Patrouille':pat}}],typecast:true});S.members=S.members.map(m=>m.recordId===rid?{...m,patrouille:pat}:m);render()}catch(e){console.error(e)}}
async function activateMember(rid){try{const mb=S.cfg.membersBase;await atPatch(mb.baseId+'/'+mb.tables.members.id,{records:[{id:rid,fields:{'Annee Scoute':S.year}}],typecast:true});S.members=S.members.map(m=>m.recordId===rid?{...m,anneeScoute:S.year}:m);render()}catch(e){console.error(e)}}

window.selectArticle=(val)=>{setState({orderArticle:val,orderPrix:''})};
window.setMemberRole=setMemberRole;window.setMemberPatrol=setMemberPatrol;window.activateMember=activateMember;
window.showTransferModal=(pat)=>{const inactives=S.members.filter(m=>!m.anneeScoute||m.anneeScoute!==S.year);setState({modal:`<h3>Transférer vers ${esc(pat)}</h3>${inactives.length===0?'<p style="color:var(--text3);font-size:13px">Aucun scout inactif à transférer.</p>':''}${inactives.map(m=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-light)"><span style="flex:1;font-size:13px;font-weight:500">${esc(m.prenom)} ${esc(m.nom)}</span><span style="font-size:11px;color:var(--text3)">${esc(m.patrouille)}</span><button class="btn btn-sm" style="background:var(--accent-bg);color:var(--accent);padding:4px 12px" onclick="doTransfer('${m.recordId}','${esc(pat)}')">→ ${esc(pat)}</button></div>`).join('')}`})};
window.doTransfer=async(rid,pat)=>{try{const mb=S.cfg.membersBase;await atPatch(mb.baseId+'/'+mb.tables.members.id,{records:[{id:rid,fields:{'Patrouille':pat,'Annee Scoute':S.year}}],typecast:true});S.members=S.members.map(m=>m.recordId===rid?{...m,patrouille:pat,anneeScoute:S.year}:m);setState({modal:null})}catch(e){console.error(e)}};

window.doConnect=()=>{S.token=document.getElementById('tok')?.value?.trim()||S.token;if(!S.token){setState({error:'Veuillez coller votre token'});return}connect()};

window.doLogout=()=>{localStorage.removeItem('scout_token');localStorage.removeItem('scout_cfg');localStorage.removeItem('scout_year');S.token='';S.cfg=null;S.year='';S.members=[];setState({screen:'setup',error:null})};
window.toggleTheme=()=>{S.theme=S.theme==='dark'?'light':'dark';localStorage.setItem('scout_theme',S.theme);render()};
window.goTo=(sc)=>{setState({screen:sc,error:null,modal:null});if(sc==='material'&&Object.keys(S.matData).length===0)loadMaterial();if(sc==='orders')loadOrders();if(sc==='finance')loadFinances();if(sc==='member_orders')loadOrders();if(sc==='formation')setState({selectedMember:null,activePillar:null,progressRecords:[],openSections:{}});if(sc==='attendance'){const att={};getActiveMembers().forEach(m=>att[m.id]=true);setState({att,reasons:{},meetDate:nextSat(),attSearch:'',attFilter:'all'})}};
window.toggleAtt=(id)=>{S.att[id]=!S.att[id];render()};window.markAll=(v)=>{getFilteredMembers('attFilter','attSearch').forEach(m=>S.att[m.id]=v);render()};

window.goToPillar=(k)=>{setState({screen:'form_pillar',activePillar:k,openSections:{}})};window.doToggleStep=(sn)=>{const{record}=getStepStatus(sn);toggleFormStep(sn,record)};window.toggleSection=(n)=>{const o={...S.openSections};o[n]=!o[n];setState({openSections:o})};
window.toggleMat=(k)=>{const o={...S.matOpen};o[k]=!o[k];setState({matOpen:o})};
window.showAddMat=(k,l)=>{setState({modal:`<h3>Ajouter à ${esc(l)}</h3><div class="form-group"><label>Nom</label><input id="mat-name" placeholder="Nom"></div><div class="form-group"><label>Quantité</label><input id="mat-qty" type="number" min="1" value="1"></div><div class="form-group"><label>Statut</label><select id="mat-status"><option value="Local">Local</option><option value="Camp">Camp</option></select></div><button class="btn btn-primary" style="width:100%;justify-content:center" onclick="addMatItem('${k}',document.getElementById('mat-name').value,document.getElementById('mat-qty').value,document.getElementById('mat-status').value)">Ajouter</button>`})};
window.showAddFin=()=>{setState({modal:`<h3>Nouvelle transaction</h3><div class="form-group"><label>Type</label><select id="fin-type"><option value="Entree">Entrée</option><option value="Sortie">Sortie</option><option value="Cotisation">Cotisation</option><option value="Paiement commande">Paiement commande</option></select></div><div class="form-group"><label>Montant ($)</label><input id="fin-montant" type="number" step="0.01" placeholder="0.00"></div><div class="form-group"><label>Description</label><input id="fin-desc" placeholder="Description"></div><div class="form-group"><label>Catégorie</label><select id="fin-cat"><option value="">— Aucune —</option><option value="Uniforme">Uniforme</option><option value="Materiel">Matériel</option><option value="Camp">Camp</option><option value="Cotisation annuelle">Cotisation</option><option value="Donation">Donation</option><option value="Autre">Autre</option></select></div><div class="form-group"><label>Membre (optionnel)</label><select id="fin-member"><option value="">— Aucun —</option>${getActiveMembers().map(m=>`<option value="${m.id}">${esc(m.prenom)} ${esc(m.nom)}</option>`).join('')}</select></div><button class="btn btn-primary" style="width:100%;justify-content:center" onclick="submitFinTx()">Enregistrer</button>`})};
window.cycleStatus=(rid,cur)=>{updateOrderField(rid,'Statut',cur==='En attente'?'Commande':cur==='Commande'?'Livre':'En attente')};
window.cyclePaye=(rid,cur)=>{updateOrderField(rid,'Paye',cur==='Non paye'?'Partiellement':cur==='Partiellement'?'Paye':'Non paye')};
window.cycleLivre=(rid,cur)=>{updateOrderField(rid,'Livre au membre',cur==='Non livre'?'Livre':'Non livre')};

(async function(){if(S.token&&S.cfg){setState({loading:true,statusMsg:'Reconnexion...',screen:'setup'});try{await loadMembers();if(S.year)setState({screen:'home',loading:false,statusMsg:null});else setState({screen:'year_select',loading:false,statusMsg:null})}catch(e){S.cfg=null;localStorage.removeItem('scout_cfg');setState({loading:false,statusMsg:null,error:'Session expirée.',screen:'setup'})}}else render()})();
</script>
</body>
</html>
