async function getAll(base,table,params={}){
  let all=[],off=null;
  do{let u=base+'/'+table+'?pageSize=100';if(off)u+='&offset='+encodeURIComponent(off);
    if(params.fields)params.fields.forEach(f=>u+='&fields%5B%5D='+encodeURIComponent(f));
    if(params.filter)u+='&filterByFormula='+encodeURIComponent(params.filter);
    const d=await api('GET',u);all=all.concat(d.records||[]);off=d.offset||null;
  }while(off);return all;
}

// ═══════════ CONNECT — just validate token by reading 1 record ═══════════
async function connect(){
  set({loading:true,error:null,statusMsg:'Vérification du token...'});
  try{
    await api('GET',BASE1+'/'+TBL.members+'?pageSize=1');
    localStorage.setItem('scout_token',S.token);
    set({statusMsg:'Chargement des membres...'});
    await loadMembers();
    if(S.year)set({screen:'home',loading:false,statusMsg:null});
    else set({screen:'year_select',loading:false,statusMsg:null});
  }catch(e){
    let msg='Erreur de connexion.';
    if(e.message.includes('401'))msg='Token invalide. Vérifiez votre token Airtable.';
    else if(e.message.includes('403'))msg='Accès refusé. Assurez-vous que le token a accès aux bases.';
    else if(e.message.includes('404'))msg='Base non trouvée. Vérifiez les accès du token.';
    else msg=e.message;
    set({loading:false,statusMsg:null,error:msg});
  }
}

// ═══════════ DATA LOADING ═══════════
async function loadMembers(){
  const recs=await getAll(BASE1,TBL.members);
  const members=recs.map(r=>{const f=r.fields||{};return{rid:r.id,id:f['ID'],prenom:f['Prenom']||'',nom:f['Nom']||'',pat:sv(f['Patrouille'])||'—',fn:sv(f['Fonction'])||'',promesse:!!f['Promesse'],sc:!!f['Seconde Classe'],pc:!!f['Première Classe'],year:sv(f['Annee Scoute'])}}).filter(m=>m.id!=null).sort((a,b)=>a.pat!==b.pat?a.pat.localeCompare(b.pat):a.prenom.localeCompare(b.prenom));
  const att={};members.forEach(m=>att[m.id]=true);set({members,att,reasons:{}});
}
function actM(){return S.members.filter(m=>!m.year||m.year===S.year)}

async function loadHistory(){set({loadingHist:true});try{const recs=await getAll(BASE1,TBL.presence,{filter:`{Annee Scoute}="${S.year}"`});const h={};recs.forEach(r=>{const f=r.fields||{},mid=f['Membre ID'];if(mid==null)return;if(!h[mid])h[mid]={p:0,a:0};h[mid].p+=(f['Presence']||0);h[mid].a+=(f['Absence']||0)});set({history:h,loadingHist:false})}catch(e){set({loadingHist:false})}}

async function loadProgress(mid){set({loadingProg:true});try{const recs=await getAll(BASE1,TBL.badges,{filter:`{Membre ID}=${mid}`});set({progressRecs:recs.map(r=>({rid:r.id,badge:r.fields['Badge']||'',cat:sv(r.fields['Categorie']),statut:sv(r.fields['Statut'])||'Non commence',dateO:r.fields['Date Obtenu']||null})),loadingProg:false})}catch(e){set({progressRecs:[],loadingProg:false})}}

async function loadMaterial(){set({matLoading:true});try{const data={};for(const mt of MAT_LABELS){const tid=MAT_TBL[mt.key];if(!tid)continue;try{const recs=await getAll(BASE2,tid);data[mt.key]=recs.map(r=>{const f=r.fields||{};return{rid:r.id,name:sv(f['Product Type'])||'—',qty:f['Quantity']||0,status:sv(f['Status']||f['status'])||''}})}catch(e){data[mt.key]=[]}}set({matData:data,matLoading:false})}catch(e){set({matLoading:false})}}

async function loadOrders(){set({ordersLoading:true});try{const recs=await getAll(BASE1,TBL.commandes,{filter:`{Annee Scoute}="${S.year}"`});set({orders:recs.map(r=>{const f=r.fields||{};return{rid:r.id,mid:f['Membre ID'],nom:f['Prenom Nom']||'',article:sv(f['Article']),taille:sv(f['Taille']),qty:f['Quantite']||1,statut:sv(f['Statut']),date:f['Date Commande']||'',badge:f['Badge Nom']||'',prix:f['Prix Unitaire']||0,paye:sv(f['Paye'])||'Non paye',livre:sv(f['Livre au membre'])||'Non livre',paid:f['Montant Paye']||0}}),ordersLoading:false})}catch(e){set({ordersLoading:false})}}

async function loadFinances(){set({finLoading:true});try{const recs=await getAll(BASE1,TBL.finances,{filter:`{Annee Scoute}="${S.year}"`});set({finTx:recs.map(r=>{const f=r.fields||{};return{rid:r.id,desc:f['Description']||'',type:sv(f['Type']),montant:f['Montant']||0,date:f['Date']||'',mid:f['Membre ID'],nom:f['Prenom Nom']||'',cat:sv(f['Categorie'])}}),finLoading:false})}catch(e){set({finLoading:false})}}

// ═══════════ ACTIONS ═══════════
async function submitAtt(){set({submitting:true,progress:0,error:null});try{const am=actM(),bs=10,total=Math.ceil(am.length/bs);let done=0;for(let i=0;i<am.length;i+=bs){const chunk=am.slice(i,i+bs);const records=chunk.map(m=>({fields:{'Membre ID':parseInt(m.id),'Reunion':S.meetDate,'Presence':S.att[m.id]?1:0,'Absence':S.att[m.id]?0:1,'Annee Scoute':S.year,...((!S.att[m.id]&&S.reasons[m.id])?{'why?':S.reasons[m.id]}:{})}}));await api('POST',BASE1+'/'+TBL.presence,{records,typecast:true});done++;set({progress:Math.round(done/total*100)})}const v=am.map(m=>S.att[m.id]);set({savedStats:{p:v.filter(Boolean).length,a:v.filter(x=>!x).length},screen:'att_ok',submitting:false})}catch(e){set({error:'Erreur: '+e.message,submitting:false})}}

async function toggleStep(sn,er){const m=S.selMember;if(!m)return;set({savingStep:sn});const cur=er?.statut||'Non commence',next=cur==='Non commence'?'En cours':cur==='En cours'?'Obtenu':'Non commence';try{if(er?.rid){const fields={'Statut':next};if(next==='Obtenu')fields['Date Obtenu']=new Date().toISOString().split('T')[0];if(next==='Non commence')fields['Date Obtenu']=null;await api('PATCH',BASE1+'/'+TBL.badges,{records:[{id:er.rid,fields}],typecast:true});set({savingStep:null,progressRecs:S.progressRecs.map(r=>r.rid===er.rid?{...r,statut:next,dateO:next==='Obtenu'?new Date().toISOString().split('T')[0]:null}:r)})}else{let cat='Spiritualite';for(const[cn,badges]of Object.entries(BADGE_CATEGORIES)){if(badges.includes(sn)){const map={'Vie Chrétienne':'Spiritualite','Arts et Expression':'Expression','Connaissance & Découverte':'Civisme','Sport':'Sport','Vie dans la Nature':'Nature','Santé et Sécurité':'Secourisme','Monde Numérique':'Technique','Technique':'Technique'};cat=map[cn]||'Technique';break}}const res=await api('POST',BASE1+'/'+TBL.badges,{records:[{fields:{'Badge':sn,'Membre ID':m.id,'Prenom Nom':`${m.prenom} ${m.nom}`,'Categorie':cat,'Statut':next,'Annee Scoute':S.year,...(next==='Obtenu'?{'Date Obtenu':new Date().toISOString().split('T')[0]}:{})}}],typecast:true});const nr=res.records?.[0];if(nr)set({savingStep:null,progressRecs:[...S.progressRecs,{rid:nr.id,badge:sn,cat,statut:next,dateO:next==='Obtenu'?new Date().toISOString().split('T')[0]:null}]});else set({savingStep:null})}}catch(e){set({savingStep:null})}}

async function submitOrder(){set({oSaving:true,error:null});try{const m=actM().find(x=>x.id===parseInt(S.oMember));if(!m)throw new Error('Sélectionnez un membre');if(!S.oArticle)throw new Error('Sélectionnez un article');const prix=S.oPrix!==''?parseFloat(S.oPrix):(ARTICLE_PRICES[S.oArticle]||0);const fields={'Description':`${S.oArticle} - ${m.prenom} ${m.nom}`,'Membre ID':m.id,'Prenom Nom':`${m.prenom} ${m.nom}`,'Article':S.oArticle,'Quantite':S.oQty||1,'Statut':'En attente','Date Commande':new Date().toISOString().split('T')[0],'Annee Scoute':S.year,'Paye':'Non paye','Livre au membre':'Non livre','Prix Unitaire':prix};if(S.oTaille)fields['Taille']=S.oTaille;if(S.oBadge)fields['Badge Nom']=S.oBadge;if(S.oNotes)fields['Notes']=S.oNotes;await api('POST',BASE1+'/'+TBL.commandes,{records:[{fields}],typecast:true});set({oSaving:false,screen:'orders',oMember:null,oArticle:'',oTaille:'',oQty:1,oBadge:'',oNotes:'',oPrix:''});loadOrders()}catch(e){set({error:e.message,oSaving:false})}}

async function updOrder(rid,field,val){try{await api('PATCH',BASE1+'/'+TBL.commandes,{records:[{id:rid,fields:{[field]:val}}],typecast:true});loadOrders()}catch(e){console.error(e)}}
async function addMat(key,name,qty,status){try{await api('POST',BASE2+'/'+MAT_TBL[key],{records:[{fields:{'Product Type':name,'Quantity':parseInt(qty)||1,'Status':status||'Local'}}],typecast:true});set({modal:null});loadMaterial()}catch(e){console.error(e)}}
async function rmMat(key,rid){try{await api('DELETE',BASE2+'/'+MAT_TBL[key]+'?records[]='+rid);loadMaterial()}catch(e){console.error(e)}}
async function submitFin(){set({finSaving:true,error:null});try{const t=document.getElementById('fin-type').value,mo=document.getElementById('fin-montant').value,d=document.getElementById('fin-desc').value,c=document.getElementById('fin-cat').value,mem=document.getElementById('fin-member').value;const fields={'Description':d,'Type':t,'Montant':parseFloat(mo)||0,'Date':new Date().toISOString().split('T')[0],'Annee Scoute':S.year};if(c)fields['Categorie']=c;if(mem){const mm=actM().find(x=>x.id===parseInt(mem));if(mm){fields['Membre ID']=mm.id;fields['Prenom Nom']=`${mm.prenom} ${mm.nom}`}}await api('POST',BASE1+'/'+TBL.finances,{records:[{fields}],typecast:true});set({finSaving:false,modal:null});loadFinances()}catch(e){set({error:e.message,finSaving:false})}}
async function setRole(rid,role){try{await api('PATCH',BASE1+'/'+TBL.members,{records:[{id:rid,fields:{'Fonction':role||''}}],typecast:true});S.members=S.members.map(m=>m.rid===rid?{...m,fn:role}:m);render()}catch(e){console.error(e)}}
async function setPat(rid,pat){try{await api('PATCH',BASE1+'/'+TBL.members,{records:[{id:rid,fields:{'Patrouille':pat}}],typecast:true});S.members=S.members.map(m=>m.rid===rid?{...m,pat}:m);render()}catch(e){console.error(e)}}
async function activate(rid){try{await api('PATCH',BASE1+'/'+TBL.members,{records:[{id:rid,fields:{'Annee Scoute':S.year}}],typecast:true});S.members=S.members.map(m=>m.rid===rid?{...m,year:S.year}:m);render()}catch(e){console.error(e)}}

// ═══════════ HELPERS ═══════════
function getSS(n){const r=S.progressRecs.find(x=>x.badge===n);return{st:r?.statut||'Non commence',rec:r||null}}
function cntO(s){return s.filter(x=>getSS(x).st==='Obtenu').length}function getBE(){return cntO(Object.values(BADGE_CATEGORIES).flat())}function isPD(){return S.selMember?.promesse||cntO(PROMESSE_STEPS)===PROMESSE_STEPS.length}function isSD(){return S.selMember?.sc}
function filtM(fk,sk){let l=actM();const f=S[fk],q=S[sk];if(f&&f!=='all'&&f!=='Tous')l=l.filter(m=>m.pat===f);if(q?.trim()){const lq=q.toLowerCase();l=l.filter(m=>(m.prenom+' '+m.nom).toLowerCase().includes(lq))}return l}
function getPats(){return[...new Set(actM().map(m=>m.pat))].filter(p=>p!=='—').sort()}
const svB=`<svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,svS=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`,svC=`<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 3L11 8L6 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`,svCk=`<svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M3.5 8.5L6.5 11.5L12.5 4.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,svL=`<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M5 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
function pRing(p,c,sz=44,sw=4){const r=(sz-sw)/2,ci=2*Math.PI*r,o=ci*(1-p);return`<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="var(--border-light)" stroke-width="${sw}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-dasharray="${ci}" stroke-dashoffset="${o}" stroke-linecap="round" style="transition:stroke-dashoffset .5s ease"/></svg>`}
function mH(t,sub,bk){return`<div class="mod-header"><div class="mod-back" onclick="goTo('${bk}')">${svB}</div><div><div class="mod-title">${E(t)}</div>${sub?`<div class="mod-sub">${E(sub)}</div>`:''}</div></div>`}

function render(){document.getElementById('root').setAttribute('data-theme',S.theme);const app=document.getElementById('app');let h='';
  switch(S.screen){case 'setup':h=rSetup();break;case 'year_select':h=rYear();break;case 'home':h=rHome();break;case 'attendance':h=rAtt();break;case 'att_history':h=rAttHist();break;case 'att_ok':h=rAttOk();break;case 'formation':h=rFormList();break;case 'form_profile':h=rFormProf();break;case 'form_pillar':h=rFormPillar();break;case 'material':h=rMat();break;case 'orders':h=rOrders();break;case 'order_form':h=rOrderForm();break;case 'finance':h=rFin();break;case 'member_orders':h=rMemOrders();break;case 'troupe_setup':h=rSetupTr();break;default:h=rHome()}
  app.innerHTML=h+(S.modal?`<div class="modal-overlay" onclick="set({modal:null})"><div class="modal" onclick="event.stopPropagation()">${S.modal}</div></div>`:'')}

function rSetup(){return`<div class="setup"><div class="setup-icon">⚜</div><h1>Scout Manager</h1><p>Connectez votre Airtable pour gérer votre troupe.</p><input type="password" id="tok" placeholder="Collez votre token ici..." value="${E(S.token)}" onkeydown="if(event.key==='Enter')doConnect()" oninput="S.token=this.value">${S.error?`<div class="error-msg" style="max-width:380px;word-break:break-word">${E(S.error)}</div>`:''}${S.statusMsg?`<div class="status-msg">${E(S.statusMsg)}</div>`:''}${S.loading?'<div class="spinner" style="margin:0 auto"></div>':''}<button class="btn btn-primary" onclick="doConnect()" ${S.loading?'disabled':''}>${S.loading?'Connexion...':'Se connecter'}</button><div class="hint-box"><strong>Comment créer votre token:</strong><br>1. Allez sur <a href="https://airtable.com/create/tokens" target="_blank">airtable.com/create/tokens</a><br>2. Cliquez <strong>Create new token</strong><br>3. Nom: <code>Scout Manager</code><br>4. Scopes: cochez <code>data.records:read</code> et <code>data.records:write</code><br>5. Access: cliquez <strong>Add a base</strong> → ajoutez <strong>Membres et Suivi</strong> et <strong>Inventaire</strong><br>6. Cliquez <strong>Create token</strong> et copiez-le ici</div><div style="display:flex;align-items:center;gap:8px;margin-top:8px"><span style="font-size:12px;color:var(--text3)">Thème:</span><div class="theme-toggle" onclick="toggleTheme()">${S.theme==='dark'?'☀️':'🌙'}</div></div></div>`}
function rYear(){const cy=new Date().getFullYear();const yrs=[];for(let y=cy-2;y<=cy+1;y++)yrs.push(`${y}-${y+1}`);return`<div class="setup"><div class="setup-icon">📅</div><h1>Année scoute</h1><p>Sélectionnez l'année en cours.</p><select id="yearsel" onchange="S.year=this.value"><option value="">— Choisir —</option>${yrs.map(y=>`<option value="${y}" ${S.year===y?'selected':''}>${y}</option>`).join('')}</select><button class="btn btn-primary" onclick="doYear()">Continuer</button><button class="btn btn-outline btn-sm" onclick="doLogout()">← Retour</button></div>`}
function rHome(){const am=actM();return`<div class="fade-in"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div></div><div style="display:flex;gap:8px;align-items:center"><div class="theme-toggle" onclick="toggleTheme()">${S.theme==='dark'?'☀️':'🌙'}</div><button class="btn btn-outline btn-sm" onclick="doLogout()">⏻</button></div></div><div class="home-header"><h1>⚜ Scout Manager</h1><p>${am.length} scouts · ${getPats().length} patrouilles</p><div class="home-year">${E(S.year)}</div></div><div class="menu-grid"><div class="menu-card" onclick="goTo('attendance')"><span class="icon">✅</span><div class="label">Présence</div><div class="desc">Prendre la présence</div></div><div class="menu-card" onclick="goTo('formation')"><span class="icon">📚</span><div class="label">Formation</div><div class="desc">Progression & badges</div></div><div class="menu-card" onclick="goTo('material')"><span class="icon">🧰</span><div class="label">Matériel</div><div class="desc">Inventaire du local</div></div><div class="menu-card" onclick="goTo('orders')"><span class="icon">👕</span><div class="label">Commandes</div><div class="desc">Uniformes & badges</div></div><div class="menu-card" onclick="goTo('finance')"><span class="icon">💰</span><div class="label">Finances</div><div class="desc">Caisse & paiements</div></div><div class="menu-card" onclick="goTo('member_orders')"><span class="icon">👤</span><div class="label">Comptes</div><div class="desc">Dettes & livraisons</div></div><div class="menu-card" onclick="goTo('troupe_setup')"><span class="icon">⚙️</span><div class="label">Setup</div><div class="desc">Patrouilles & rôles</div></div></div><div style="display:flex;justify-content:center;gap:12px;margin-top:28px"><button class="btn btn-outline btn-sm" onclick="set({screen:'year_select'})">📅 ${E(S.year)}</button></div></div>`}

function rFormProf(){const m=S.selMember;if(!m)return'';if(S.loadingProg)return`<div class="fade-in">${mH(m.prenom+' '+m.nom,'','formation')}<div class="loading"><div class="spinner"></div><span class="loading-text">Chargement...</span></div></div>`;const pd=cntO(PROMESSE_STEPS),pp=pd/PROMESSE_STEPS.length,aS=Object.values(SECONDE_SECTIONS).flat(),sd=cntO(aS),sb=Math.min(getBE(),5),sp=(sd+sb)/(aS.length+5),psd=Object.entries(PREMIERE_SECTIONS).reduce((a,[,s])=>a+Math.min(cntO(s),3),0),ptr=Object.keys(PREMIERE_SECTIONS).length*3,pe=Math.min(Math.max(getBE()-5,0),5),prp=(psd+pe)/(ptr+5),be=getBE(),bp=be/TOTAL_BADGES,pc=m.promesse||pp===1,sc=m.sc||sp>=1,prc=m.pc;function pCd(n,sub,pct,col,comp,lock,key){return`<div class="menu-card" style="${comp?'border-color:'+col+';border-width:2px':''}${lock?';opacity:.45;cursor:default':''}" onclick="${lock?'':`goPillar('${key}')`}">${comp?`<div style="position:absolute;top:0;right:0;font-size:9px;font-weight:600;padding:3px 10px;border-radius:0 0 0 8px;color:#fff;background:${col}">✓</div>`:''}${lock?`<div style="position:absolute;top:10px;right:10px;color:var(--text3)">${svL}</div>`:''}<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><div style="position:relative;width:44px;height:44px;flex-shrink:0">${pRing(pct,col)}<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:${col}">${Math.round(pct*100)}%</div></div><div><div style="font-size:14px;font-weight:500">${n}</div><div style="font-size:11px;color:var(--text3)">${sub}</div></div></div>${!lock?`<div style="height:4px;border-radius:2px;background:var(--border-light);overflow:hidden"><div style="height:100%;border-radius:2px;width:${Math.round(pct*100)}%;background:${col};transition:width .5s"></div></div>`:''}</div>`}return`<div class="fade-in">${mH(m.prenom+' '+m.nom,m.pat,'formation')}<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px"><div class="avatar" function rFormPillar(){const m=S.selMember,p=S.activePillar;if(!m||!p)return'';const ti={promesse:'Promesse',seconde:'Seconde classe',premiere:'Première classe',badges:'Badges'},co={promesse:'var(--purple)',seconde:'var(--info)',premiere:'var(--danger)',badges:'#1a7a6a'};function sR(sn,lock){const{st}=getSS(sn);let c='';if(st==='Obtenu')c=`<div style="width:22px;height:22px;border-radius:50%;background:var(--accent);color:#0c0f14;display:flex;align-items:center;justify-content:center;flex-shrink:0">${svCk}</div>`;else if(st==='En cours')c=`<div style="width:22px;height:22px;border-radius:50%;border:2px solid var(--warn);background:var(--warn-bg);color:var(--warn);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700">~</div>`;else c=`<div style="width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0"></div>`;return`<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);cursor:${lock?'default':'pointer'};opacity:${lock?.4:1}" ${lock?'':`onclick="doToggle(\`${sn.replace(/`/g,'')}\`)"`}>${c}<span style="font-size:13px;flex:1;${st==='Obtenu'?'color:var(--accent);font-weight:500':''}">${E(sn)}</span>${S.savingStep===sn?'<span style="font-size:10px;color:var(--text3)">...</span>':''}</div>`}function sA(sn,steps,lock){const d=cntO(steps),t=steps.length,io=!!S.openSec[sn];return`<div style="border-bottom:1px solid var(--border-light)"><div style="display:flex;align-items:center;gap:8px;padding:12px 4px;cursor:pointer;user-select:none" onclick="togSec(\`${sn.replace(/`/g,'')}\`)"><div style="transition:transform .2s;color:var(--text3);${io?'transform:rotate(90deg)':''}">${svC}</div><span style="flex:1;font-weight:500;font-size:14px">${E(sn)}</span><span style="font-size:11px;padding:2px 9px;border-radius:10px;font-weight:500;${d===t?'background:var(--accent-bg);color:var(--accent)':'background:var(--bg3);color:var(--text2)'}">${d}/${t}</span></div>${io?step S.oSaving?'disabled':''}>${S.oSaving?'Envoi...':'Soumettre'}</button></div>`}

// ═══ FINANCE ═══
function rFin(){if(S.finLoading)return`<div class="fade-in">${mH('Finances','','home')}<div class="loading"><div class="spinner"></div><span class="loading-text">Chargement...</span></div></div>`;const ent=S.finTx.filter(t=>t.type!=='Sortie').reduce((s,t)=>s+t.montant,0),sor=S.finTx.filter(t=>t.type==='Sortie').reduce((s,t)=>s+t.montant,0),bal=ent-sor,tDue=S.orders.reduce((s,o)=>s+(o.prix*o.qty)||0,0),tPaid=S.orders.reduce((s,o)=>s+(o.paid||0),0);return`<div class="fade-in">${mH('Finances '+S.year,'','home')}<div class="fin-balance" style="background:var(--card-bg);border:1.5px solid var(--border-light);border-radius:var(--radius-lg)"><div style="font-size:12px;color:var(--text3);text-transform:uppercase;font-weight:600;margin-bottom:4px">Solde de la caisse</div><span style="color:${bal>=0?'var(--accent)':'var(--danger)'}">${$(bal)}</span></div><div class="stat-row"><div class="stat-box"><div class="num" style="color:var(--accent);font-size:16px">${$(ent)}</div><div class="lbl">Entrées</div></div><div class="stat-box"><div class="num" style="color:var(--danger);font-size:16px">${$(sor)}</div><div class="lbl">Sorties</div></div><div class="stat-box"><div class="num" style="color:var(--warn);font-size:16px">${$(tDue-tPaid)}</div><div class="lbl">Dettes</div></div></div><button class="btn btn-primary" style="width:100%;justify-content:center;margin-bottom:16px" onclick="showAddFin()">+ Transaction</button><div class="fin-card"><h3>Transactions</h3>${S.finTx.length===0?'<div style="text-align:center;color:var(--text3);font-size:13px;padding:12px">Aucune</div>':''}${S.finTx.sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(t=>{const isIn=t.type!=='Sortie';return`<div class="fin-tx"><div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:${isIn?'var(--accent-bg)':'var(--danger-bg)'}">${isIn?'↓':'↑'}</div><div style="flex:1;min-width:0"><div style="font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${E(t.desc)}</div><div style="font-size:11px;color:var(--text3)">${t.cat?E(t.cat)+' · ':''}${fmtD(t.date)}${t.nom?' · '+E(t.nom):''}</div></div><span class="fin-tx-amount" style="color:${isIn?'var(--accent)':'var(--danger)'}">${isIn?'+':'−'}${$(t.montant)}</span></div>`}).join('')}</div></div>`}

// ═══ MEMBER ORDERS ═══
function rMemOrders(){const am=actM(),md={};S.orders.forEach(o=>{const mid=o.mid;if(!mid)return;if(!md[mid])md[mid]={nom:o.nom,total:0,paid:0,orders:[]};md[mid].total+=(o.prix*o.qty)||0;md[mid].paid+=(o.paid||0);md[mid].orders.push(o)});const dl=Object.entries(md).map(([mid,d])=>({mid:parseInt(mid),...d,owed:d.total-d.paid})).sort((a,b)=>b.owed-a.owed);return`<div class="fade-in">${mH('Comptes '+S.year,'','home')}${dl.length===0?'<div class="empty-state"><span class="e-icon">👤</span>Aucune commande.</div>':''}${dl.map(d=>{const m=am.find(x=>x.id===d.mid),co=m?patC(m.pat):'#888',allP=d.owed<=0,allD=d.orders.every(o=>o.livre==='Livre');return`<div class="fin-card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${m?`<div class="avatar" style="width:32px;height:32px;font-size:11px;background:${co}">${(m.prenom[0]||'')+(m.nom[0]||'')}</div>`:''}<div style="flex:1"><div style="font-weight:600;font-size:14px">${E(d.nom)}</div><div style="font-size:11px;color:var(--text3)">${d.orders.length} cmd</div></div><div style="text-align:right"><div style="font-family:var(--font-mono);font-weight:700;font-size:14px;color:${allP?'var(--accent)':'var(--danger)'}">${allP?'Soldé':$(d.owed)}</div><div style="font-size:10px;color:var(--text3)">${allD?'✓ Livré':'En attente'}</div></div></div>${d.orders.map(o=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--border-light);font-size:12px"><span style="flex:1">${E(o.article)}${o.taille?' '+E(o.taille):''} ×${o.qty}</span><span class="pill" style="background:${o.paye==='Paye'?'var(--accent-bg)':o.paye==='Partiellement'?'var(--warn-bg)':'var(--danger-bg)'};color:${o.paye==='Paye'?'var(--accent)':o.paye==='Partiellement'?'var(--warn)':'var(--danger)'}">${E(o.paye)}</span><span class="pill" style="background:${o.livre==='Livre'?'var(--accent-bg)':'var(--danger-bg)'};color:${o.livre==='Livre'?'var(--accent)':'var(--danger)'}">${E(o.livre)}</span></div>`).join('')}</div>`}).join('')}</div>`}

// ═══ SETUP TROUPE ═══
function rSetupTr(){const am=actM(),ps=getPats(),g={};am.forEach(m=>{const p=m.pat||'—';if(!g[p])g[p]=[];g[p].push(m)});return`<div class="fade-in">${mH('Setup '+S.year,'Patrouilles & rôles','home')}<div class="fin-card"><h3>📋 Vue d'ensemble</h3><div class="stat-row">${ps.map(p=>`<div class="stat-box"><div class="num" style="color:${patC(p)};font-size:16px">${(g[p]||[]).length}</div><div class="lbl">${PAT_ICONS[p]||''} ${E(p)}</div></div>`).join('')}</div></div>${ps.sort((a,b)=>{const ai=PATROUILLES.indexOf(a),bi=PATROUILLES.indexOf(b);return(ai===-1?99:ai)-(bi===-1?99:bi)}).map(pat=>{const ms=g[pat]||[],cp=ms.find(m=>m.fn==='CP'),sp=ms.find(m=>m.fn==='SP');return`<div class="fin-card"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div style="width:14px;height:14px;border-radius:50%;background:${patC(pat)}"></div><div style="font-family:var(--font-display);font-size:16px;font-weight:500;flex:1">${PAT_ICONS[pat]||''} ${E(pat)}</div><span style="font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 10px;border-radius:10px;font-weight:600">${ms.length}</span></div><div style="display:flex;gap:8px;margin-bottom:10px"><div style="flex:1;padding:8px 12px;border-radius:var(--radius);background:var(--purple-bg);border:1px solid rgba(192,132,252,.15)"><div style="font-size:10px;color:var(--purple);font-weight:600;text-transform:uppercase">CP</div><div style="font-size:13px;font-weight:500;margin-top:2px">${cp?E(cp.prenom)+' '+E(cp.nom):'<span style="color:var(--text3)">—</span>'}</div></div><div style="flex:1;padding:8px 12px;border-radius:var(--radius);background:var(--info-bg);border:1px solid rgba(96,165,250,.15)"><div style="font-size:10px;color:var(--info);font-weight:600;text-transform:uppercase">SP</div><div style="font-size:13px;font-weight:500;margin-top:2px">${sp?E(sp.prenom)+' '+E(sp.nom):'<span style="color:var(--text3)">—</span>'}</div></div></div>${ms.map(m=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--border-light);font-size:13px"><div class="avatar" style="width:28px;height:28px;font-size:10px;background:${patC(pat)}">${(m.prenom[0]||'')+(m.nom[0]||'')}</div><span style="flex:1;font-weight:500">${E(m.prenom)} ${E(m.nom)}</span>${m.fn?`<span class="pill" style="background:${m.fn==='CP'?'var(--purple-bg)':'var(--info-bg)'};color:${m.fn==='CP'?'var(--purple)':'var(--info)'}">${E(m.fn)}</span>`:''}<select style="padding:4px 8px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text);font-family:var(--font)" onchange="setRole('${m.rid}',this.value)"><option value="" ${!m.fn?'selected':''}>Scout</option><option value="CP" ${m.fn==='CP'?'selected':''}>CP</option><option value="SP" ${m.fn==='SP'?'selected':''}>SP</option></select><select style="padding:4px 8px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text);font-family:var(--font)" onchange="setPat('${m.rid}',this.value)">${PATROUILLES.map(p=>`<option value="${E(p)}" ${m.pat===p?'selected':''}>${PAT_ICONS[p]} ${E(p)}</option>`).join('')}</select></div>`).join('')}<button class="btn btn-sm btn-outline" style="width:100%;justify-content:center;margin-top:8px" onclick="showTransfer('${E(pat)}')">+ Transférer</button></div>`}).join('')}<div class="fin-card"><h3>🔄 Activer pour ${E(S.year)}</h3><p style="font-size:12px;color:var(--text2);margin-bottom:10px">Scouts d'une autre année ou sans année assignée.</p>${S.members.filter(m=>!m.year||m.year!==S.year).length===0?'<div style="text-align:center;color:var(--text3);font-size:13px;padding:8px">Tous actifs ✓</div>':''}${S.members.filter(m=>!m.year||m.year!==S.year).map(m=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px solid var(--border-light);font-size:13px"><span style="flex:1;font-weight:500">${E(m.prenom)} ${E(m.nom)}</span><span style="font-size:11px;color:var(--text3)">${E(m.pat)}${m.year?' · '+E(m.year):''}</span><button class="btn btn-sm" style="background:var(--accent-bg);color:var(--accent);padding:4px 12px" onclick="activate('${m.rid}')">Activer</button></div>`).join('')}</div></div>`}

// ═══════════ GLOBAL HANDLERS ═══════════
window.doConnect=()=>{S.token=document.getElementById('tok')?.value?.trim()||S.token;if(!S.token){set({error:'Veuillez coller votre token'});return}connect()};
window.doYear=()=>{const s=document.getElementById('yearsel');if(s)S.year=s.value;if(!S.year)return;localStorage.setItem('scout_year',S.year);set({screen:'home'})};
window.doLogout=()=>{localStorage.removeItem('scout_token');localStorage.removeItem('scout_year');S.token='';S.year='';S.members=[];set({screen:'setup',error:null})};
window.toggleTheme=()=>{S.theme=S.theme==='dark'?'light':'dark';localStorage.setItem('scout_theme',S.theme);render()};
window.goTo=(sc)=>{set({screen:sc,error:null,modal:null});if(sc==='material'&&Object.keys(S.matData).length===0)loadMaterial();if(sc==='orders'||sc==='member_orders')loadOrders();if(sc==='finance'){loadFinances();loadOrders()}if(sc==='formation')set({selMember:null,activePillar:null,progressRecs:[],openSec:{}});if(sc==='attendance'){const att={};actM().forEach(m=>att[m.id]=true);set({att,reasons:{},meetDate:nxSat(),attSearch:'',attFilter:'all'})}};
window.togAtt=(id)=>{S.att[id]=!S.att[id];render()};window.markAll=(v)=>{filtM('attFilter','attSearch').forEach(m=>S.att[m.id]=v);render()};
window.resetAtt=()=>{const att={};actM().forEach(m=>att[m.id]=true);set({att,reasons:{},meetDate:nxSat(),screen:'attendance',error:null})};
window.selForm=(id)=>{const m=S.members.find(x=>x.id===id);if(m){set({selMember:m,screen:'form_profile',activePillar:null,openSec:{}});loadProgress(m.id)}};
window.goPillar=(k)=>{set({screen:'form_pillar',activePillar:k,openSec:{}})};
window.doToggle=(sn)=>{const{rec}=getSS(sn);toggleStep(sn,rec)};
window.togSec=(n)=>{const o={...S.openSec};o[n]=!o[n];set({openSec:o})};
window.togMat=(k)=>{const o={...S.matOpen};o[k]=!o[k];set({matOpen:o})};
window.selArt=(v)=>{set({oArticle:v,oPrix:''})};
window.showAddMat=(k,l)=>{set({modal:`<h3>Ajouter à ${E(l)}</h3><div class="form-group"><label>Nom</label><input id="mat-name" placeholder="Nom"></div><div class="form-group"><label>Quantité</label><input id="mat-qty" type="number" min="1" value="1"></div><div class="form-group"><label>Statut</label><select id="mat-status"><option value="Local">Local</option><option value="Camp">Camp</option></select></div><button class="btn btn-primary" style="width:100%;justify-content:center" onclick="addMat('${k}',document.getElementById('mat-name').value,document.getElementById('mat-qty').value,document.getElementById('mat-status').value)">Ajouter</button>`})};
window.showAddFin=()=>{set({modal:`<h3>Nouvelle transaction</h3><div class="form-group"><label>Type</label><select id="fin-type"><option value="Entree">Entrée</option><option value="Sortie">Sortie</option><option value="Cotisation">Cotisation</option><option value="Paiement commande">Paiement commande</option></select></div><div class="form-group"><label>Montant ($)</label><input id="fin-montant" type="number" step="0.01" placeholder="0.00"></div><div class="form-group"><label>Description</label><input id="fin-desc" placeholder="Description"></div><div class="form-group"><label>Catégorie</label><select id="fin-cat"><option value="">— Aucune —</option><option value="Uniforme">Uniforme</option><option value="Materiel">Matériel</option><option value="Camp">Camp</option><option value="Cotisation annuelle">Cotisation</option><option value="Donation">Donation</option><option value="Autre">Autre</option></select></div><div class="form-group"><label>Membre (optionnel)</label><select id="fin-member"><option value="">— Aucun —</option>${actM().map(m=>`<option value="${m.id}">${E(m.prenom)} ${E(m.nom)}</option>`).join('')}</select></div><button class="btn btn-primary" style="width:100%;justify-content:center" onclick="submitFin()">Enregistrer</button>`})};
window.cycStat=(rid,cur)=>{updOrder(rid,'Statut',cur==='En attente'?'Commande':cur==='Commande'?'Livre':'En attente')};
window.cycPay=(rid,cur)=>{updOrder(rid,'Paye',cur==='Non paye'?'Partiellement':cur==='Partiellement'?'Paye':'Non paye')};
window.cycLiv=(rid,cur)=>{updOrder(rid,'Livre au membre',cur==='Non livre'?'Livre':'Non livre')};
window.showTransfer=(pat)=>{const inact=S.members.filter(m=>!m.year||m.year!==S.year);set({modal:`<h3>Transférer vers ${E(pat)}</h3>${inact.length===0?'<p style="color:var(--text3);font-size:13px">Aucun scout inactif.</p>':''}${inact.map(m=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-light)"><span style="flex:1;font-size:13px;font-weight:500">${E(m.prenom)} ${E(m.nom)}</span><button class="btn btn-sm" style="background:var(--accent-bg);color:var(--accent);padding:4px 12px" onclick="transfer('${m.rid}','${E(pat)}')">→ ${E(pat)}</button></div>`).join('')}`})};

// ═══════════ INIT ═══════════
(async function(){
  if(S.token){set({loading:true,statusMsg:'Reconnexion...',screen:'setup'});
    try{await loadMembers();if(S.year)set({screen:'home',loading:false,statusMsg:null});else set({screen:'year_select',loading:false,statusMsg:null})}
    catch(e){set({loading:false,statusMsg:null,error:'Session expirée — reconnectez-vous.',screen:'setup'})}
  }else render();
})();
</script>
</body>
</html>
