function fmtD(s){if(!s)return'—';const m=['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'],p=s.split('-');return parseInt(p[2])+' '+m[parseInt(p[1])-1]+' '+p[0]}
function E(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ═══════════ API — direct table access, no meta endpoints ═══════════
async function api(method,path,body){
  const opts={method,headers:{'Authorization':'Bearer '+S.token}};
  if(body){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body)}
  const r=await fetch('https://api.airtable.com/v0/'+path,opts);
  if(!r.ok){const t=await r.text();throw new Error('API '+r.status+': '+t.substring(0,200))}
  return r.json();
}
async function getAll(base,table,params={}){
  let all=[],off=null;
  do{let u=base+'/'+table+'?pageSize=100';if(off)u+='&offset='+encodeURIComponent(off);
    if(params.fields)params.fields.forEach(f=>u+='&fields%5B%5D='+encodeURIComponent(f));
    if(params.filter)u+='&filterByFormula='+encodeURIComponent(params.filter);
    const d=await api('GET',u);all=all.concat(d.records||[]);off=d.offset||null;
  }while(off);return all;
}

// ═══════════ CONNECT — just validate token by reading 1 record ═══════════
async function connect(){
  set({loading:true,error:null,statusMsg:'Connexion aux bases...'});
  try{
    // Step 1: list all bases (needs schema.bases:read)
    const basesData=await api('GET','meta/bases');
    const bases=(basesData.bases||[]).map(b=>({id:b.id,name:b.name}));
    if(!bases.length)throw new Error('Aucune base trouvée avec ce token.');
    set({statusMsg:'Détection des tables ('+bases.length+' bases)...'});
    
    // Step 2: scan each base for matching tables
    let bestMembers=null,bestMembersScore=0,bestMat=null,bestMatCount=0;
    for(const b of bases){
      try{
        const schema=await api('GET','meta/bases/'+b.id+'/tables');
        const tables=(schema.tables||[]).map(t=>({id:t.id,name:t.name,_fn:(t.fields||[]).map(f=>f.name.toLowerCase().trim())}));
        
        // Detect member-related tables
        const found={};
        for(const t of tables){
          for(const[key,sig]of Object.entries(SIGS)){if(!found[key]&&sig(t))found[key]=t.id}
          // Detect material tables by name
          for(const[mk,hint]of Object.entries(MAT_HINTS)){if(t.name.toLowerCase().includes(hint)&&!found['mat_'+mk])found['mat_'+mk]=t.id}
        }
        const sc=scoreBase(found);
        if(sc>bestMembersScore){bestMembersScore=sc;bestMembers={baseId:b.id,name:b.name,tables:found}}
        const matCount=Object.keys(found).filter(k=>k.startsWith('mat_')).length;
        if(matCount>bestMatCount){bestMatCount=matCount;bestMat={baseId:b.id,name:b.name,tables:found}}
      }catch(e){/* skip inaccessible bases */}
    }
    
    if(!bestMembers||!bestMembers.tables.members)throw new Error('Aucune base avec une table membres détectée. Vérifiez que votre base contient les tables requises (Prenom, Nom, Patrouille...).');
    
    // Step 3: assign detected IDs
    BASE1=bestMembers.baseId;
    TBL.members=bestMembers.tables.members||'';
    TBL.presence=bestMembers.tables.presence||'';
    TBL.badges=bestMembers.tables.badges||'';
    TBL.commandes=bestMembers.tables.commandes||'';
    TBL.finances=bestMembers.tables.finances||'';
    TBL.historique=bestMembers.tables.historique||'';
    TBL.config=bestMembers.tables.config||'tblK4gxSX8rqrAEOJ';
    
    if(bestMat&&bestMatCount>2){
      BASE2=bestMat.baseId;
      for(const[mk,hint]of Object.entries(MAT_HINTS)){MAT_TBL[mk]=bestMat.tables['mat_'+mk]||''}
    }else{BASE2=BASE1;MAT_TBL={}}
    
    // Cache config
    localStorage.setItem('scout_token',S.token);
    localStorage.setItem('scout_cfg2',JSON.stringify({BASE1,BASE2,TBL,MAT_TBL}));
    
    set({statusMsg:'Chargement des membres...'});
    await loadMembers();
    if(S.year)set({screen:'home',loading:false,statusMsg:null});
    else set({screen:'year_select',loading:false,statusMsg:null});
  }catch(e){
    let msg=e.message;
    if(msg.includes('401'))msg='Token invalide. Vérifiez votre token Airtable.';
    else if(msg.includes('403'))msg='Accès refusé. Ajoutez vos bases au token.';
    else if(msg.includes('422'))msg='Scope manquant. Ajoutez schema.bases:read à votre token.';
    set({loading:false,statusMsg:null,error:msg});
  }
}
function restoreConfig(){
  try{const c=JSON.parse(localStorage.getItem('scout_cfg2'));if(c&&c.BASE1&&c.TBL?.members){BASE1=c.BASE1;BASE2=c.BASE2;Object.assign(TBL,c.TBL);Object.assign(MAT_TBL,c.MAT_TBL||{});if(!TBL.config)TBL.config='tblK4gxSX8rqrAEOJ';return true}}catch(e){}return false;
}

async function loadMemberHistory(mid){set({mhLoading:true});try{
  const[attAll,histRecs,badgeRecs,orderRecs]=await Promise.all([
    getAll(BASE1,TBL.presence,{filter:`{Membre ID}=${mid}`}),
    getAll(BASE1,TBL.historique,{filter:`{Membre ID}=${mid}`}),
    getAll(BASE1,TBL.badges,{filter:`{Membre ID}=${mid}`}),
    getAll(BASE1,TBL.commandes,{filter:`{Membre ID}=${mid}`})
  ]);
  const years={};const initY=yr=>{if(!years[yr])years[yr]={p:0,a:0,pat:'',fn:'',badges:[],formations:[],orders:[]}};
  attAll.forEach(r=>{const f=r.fields||{};const yr=sv(f['Annee Scoute'])||'?';initY(yr);years[yr].p+=(f['Presence']||0);years[yr].a+=(f['Absence']||0)});
  histRecs.forEach(r=>{const f=r.fields||{};const yr=sv(f['Annee Scoute'])||'?';initY(yr);years[yr].pat=sv(f['Patrouille'])||years[yr].pat;years[yr].fn=sv(f['Fonction'])||years[yr].fn});
  // Collect badges per year (only real badges, not formation steps)
  badgeRecs.forEach(r=>{const f=r.fields||{};const yr=sv(f['Annee Scoute'])||'all';const name=f['Badge']||'';const statut=sv(f['Statut']);if(statut==='Obtenu'&&ALL_BADGES.has(name)){initY(yr);years[yr].badges.push(name)}});
  // Determine which formations were completed and in which year
  const allObt=new Set(badgeRecs.filter(r=>sv(r.fields?.['Statut'])==='Obtenu').map(r=>r.fields?.['Badge']||''));
  const stepDates={};badgeRecs.forEach(r=>{const f=r.fields||{};if(sv(f['Statut'])==='Obtenu'&&f['Date Obtenu'])stepDates[f['Badge']||'']=f['Date Obtenu']});
  function formYear(steps){const dates=steps.map(s=>stepDates[s]).filter(Boolean);if(dates.length===0)return null;const last=dates.sort().pop();return last?last.substring(0,4):'?'}
  const m=S.members.find(x=>x.id===mid);
  const promDone=m?.promesse||PROMESSE_STEPS.every(s=>allObt.has(s));
  const secDone=m?.sc||Object.values(SECONDE_SECTIONS).flat().every(s=>allObt.has(s));
  const preDone=m?.pc;
  if(promDone){const fy=formYear(PROMESSE_STEPS);const cy=new Date().getFullYear();for(let y=cy-3;y<=cy+1;y++){const k=`${y}-${y+1}`;if(fy&&k.includes(fy)){initY(k);years[k].formations.push('Promesse ✓');break}}if(fy===null){initY(S.year);if(!years[S.year].formations.includes('Promesse ✓'))years[S.year].formations.push('Promesse ✓')}}
  if(secDone){const fy=formYear(Object.values(SECONDE_SECTIONS).flat());const cy=new Date().getFullYear();for(let y=cy-3;y<=cy+1;y++){const k=`${y}-${y+1}`;if(fy&&k.includes(fy)){initY(k);years[k].formations.push('Seconde Classe ✓');break}}if(fy===null){initY(S.year);if(!years[S.year].formations.includes('Seconde Classe ✓'))years[S.year].formations.push('Seconde Classe ✓')}}
  if(preDone){initY(S.year);if(!years[S.year].formations.includes('Première Classe ✓'))years[S.year].formations.push('Première Classe ✓')}
  orderRecs.forEach(r=>{const f=r.fields||{};const yr=sv(f['Annee Scoute'])||'?';initY(yr);years[yr].orders.push({article:sv(f['Article']),qty:f['Quantite']||1,prix:f['Prix Unitaire']||0,paye:sv(f['Paye'])||'Non payé',livre:sv(f['Livre au membre'])||'Non livré'})});
  if(m&&S.year){initY(S.year);if(!years[S.year].pat)years[S.year].pat=m.pat;if(!years[S.year].fn)years[S.year].fn=m.fn}
  const hasP=promDone;const hasSC=secDone;const hasPC=preDone;
  const classe=hasPC?'Première Classe':hasSC?'Seconde Classe':hasP?'Promesse':'Aspirant';
  const totalBadgesAll=badgeRecs.filter(r=>sv(r.fields?.['Statut'])==='Obtenu'&&ALL_BADGES.has(r.fields?.['Badge']||'')).length;
  set({mhData:{years,totalBadges:totalBadgesAll,classe},mhLoading:false});
}catch(e){set({mhLoading:false,mhData:null})}}

async function toggleStep(sn,er){const m=S.selMember;if(!m)return;set({savingStep:sn});const cur=er?.statut||'Non commence',next=cur==='Non commence'?'En cours':cur==='En cours'?'Obtenu':'Non commence';
try{

async function checkFormationCompletion(m){
  try{
    const recs=S.progressRecs;const obt=new Set(recs.filter(r=>r.statut==='Obtenu').map(r=>r.badge));
    const promDone=PROMESSE_STEPS.every(s=>obt.has(s));
    const secSteps=Object.values(SECONDE_SECTIONS).flat();const secDone=secSteps.every(s=>obt.has(s));
    const prSteps=Object.values(PREMIERE_SECTIONS).flat();
    const prDone=Object.entries(PREMIERE_SECTIONS).every(([,steps])=>{let c=0;steps.forEach(s=>{if(obt.has(s))c++});return c>=3||c>=steps.length});
    const fields={};
    if(promDone&&!m.promesse)fields['Promesse']=true;
    if(!promDone&&m.promesse)fields['Promesse']=false;
    if(secDone&&!m.sc)fields['Seconde Classe']=true;
    if(!secDone&&m.sc)fields['Seconde Classe']=false;
    if(prDone&&!m.pc)fields['Première Classe']=true;
    if(!prDone&&m.pc)fields['Première Classe']=false;
    if(Object.keys(fields).length>0){
      await api('PATCH',BASE1+'/'+TBL.members,{records:[{id:m.rid,fields}],typecast:true});
      if('Promesse' in fields){m.promesse=fields['Promesse'];S.members=S.members.map(x=>x.rid===m.rid?{...x,promesse:fields['Promesse']}:x)}
      if('Seconde Classe' in fields){m.sc=fields['Seconde Classe'];S.members=S.members.map(x=>x.rid===m.rid?{...x,sc:fields['Seconde Classe']}:x)}

function rMemberHist(){const m=S.mhMember;if(!m)return'';if(S.mhLoading)return`<div class="fade-in">${mH(m.prenom+' '+m.nom,'Historique','dashboard')}<div class="loading"><div class="spinner"></div><span class="loading-text">Chargement historique...</span></div></div>`;const d=S.mhData;if(!d)return`<div class="fade-in">${mH(m.prenom+' '+m.nom,'','dashboard')}<div class="empty-state">Pas de données.</div></div>`;

${yrs.map(yr=>{const y=d.years[yr];const tot=y.p+y.a;const rate=tot>0?Math.round(y.p/tot*100):0;const rc=rate>=75?'rate-good':rate>=50?'rate-mid':'rate-bad';const oDue=y.orders.reduce((s,o)=>s+(o.prix*o.qty||0),0);const oUnpaid=y.orders.filter(o=>o.paye!=='Payé').length;

${y.formations.length?`<div style="margin-top:6px"><div style="display:flex;flex-wrap:wrap;gap:4px">${y.formations.map(f=>`<span style="font-size:11px;padding:3px 10px;border-radius:6px;font-weight:600;background:var(--purple-bg);color:var(--purple)">🎓 ${E(f)}</span>`).join('')}</div></div>`:''}
${y.badges.length?`<div style="margin-top:6px"><div style="font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:4px">Badges obtenus (${y.badges.length})</div><div style="display:flex;flex-wrap:wrap;gap:4px">${y.badges.map(b=>`<span style="font-size:10px;padding:2px 8px;border-radius:6px;background:var(--accent-bg);color:var(--accent)">${E(b)}</span>`).join('')}</div></div>`:''}
${y.orders.length?`<div style="font-size:12px;color:var(--text2);margin-top:6px"><strong>${y.orders.length}</strong> commande${y.orders.length>1?'s':''} · Total: ${$(oDue)}${oUnpaid?' · <span style="color:var(--danger)">'+oUnpaid+' non payé</span>':' · <span style="color:var(--accent)">Tout payé ✓</span>'}</div>`:''}</div>`}).join('')}
${yrs.length===0?'<div class="empty-state"><span class="e-icon">📅</span>Pas encore d\'historique. Sauvegardez un snapshot depuis le Dashboard.</div>':''}
</div>`}

window.showMeetings=()=>{const d=S.dashData;if(!d||!d.meetings)return;set({modal:`<h3>📅 Présence par réunion</h3>${d.meetings.map(m=>{const r=m.total>0?Math.round(m.p/m.total*100):0;const rc=r>=75?'rate-good':r>=50?'rate-mid':'rate-bad';return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light)"><span style="font-weight:500;font-size:13px;min-width:100px">${fmtD(m.date)}</span><div style="flex:1;height:6px;border-radius:3px;background:var(--border-light);overflow:hidden"><div style="height:100%;border-radius:3px;width:${r}%;background:var(--accent)"></div></div><span style="font-family:var(--font-mono);font-size:12px;color:var(--accent)">${m.p}</span><span style="font-size:10px;color:var(--text3)">/</span><span style="font-family:var(--font-mono);font-size:12px;color:var(--danger)">${m.a}</span><span class="rate-badge ${rc}" style="min-width:40px;text-align:center;font-size:11px">${r}%</span></div>`}).join('')}${d.meetings.length===0?'<div style="text-align:center;color:var(--text3);padding:12px">Aucune réunion enregistrée.</div>':''}`})};
window.showCart=()=>{
  const toOrder=S.orders.filter(o=>o.statut!=='Commandé');
  if(toOrder.length===0){set({modal:`<h3>🛒 Panier d'achat</h3><div style="text-align:center;color:var(--text3);padding:20px;font-size:14px">Tous les articles sont déjà commandés ✓</div>`});return}
  // Group by article + taille
  const groups={};toOrder.forEach(o=>{const key=o.article+(o.taille?' '+o.taille:'')+(o.badge?' ('+o.badge+')':'');if(!groups[key])groups[key]={label:key,qty:0,cost:0,unitPrice:0};groups[key].qty+=o.qty;groups[key].cost+=(o.prix*o.qty)||0;groups[key].unitPrice=o.prix||0});
  const lines=Object.values(groups).sort((a,b)=>a.label.localeCompare(b.label));
  const totalQty=lines.reduce((s,l)=>s+l.qty,0);const totalCost=lines.reduce((s,l)=>s+l.cost,0);
  // Group by article type for subtotals
  const byType={};toOrder.forEach(o=>{if(!byType[o.article])byType[o.article]={qty:0,cost:0};byType[o.article].qty+=o.qty;byType[o.article].cost+=(o.prix*o.qty)||0});
  const typeLines=Object.entries(byType).sort((a,b)=>b[1].cost-a[1].cost);
  set({modal:`<h3>🛒 Panier — Articles à commander</h3>
<div style="margin-bottom:16px">${lines.map(l=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-light)"><span style="flex:1;font-size:14px;font-weight:500">${E(l.label)}</span><span style="font-family:var(--font-mono);font-weight:700;color:var(--accent);font-size:14px">×${l.qty}</span><span style="font-family:var(--font-mono);font-size:13px;color:var(--text2);min-width:60px;text-align:right">${$(l.cost)}</span></div>`).join('')}</div>
<div style="padding:12px;border-radius:var(--radius);background:var(--bg3);margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:8px">Résumé par type</div>${typeLines.map(([a,d])=>`<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px"><span style="flex:1;font-weight:500">${E(a)}</span><span style="font-family:var(--font-mono);color:var(--accent)">×${d.qty}</span><span style="font-family:var(--font-mono);color:var(--text2);min-width:60px;text-align:right">${$(d.cost)}</span></div>`).join('')}</div>
<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-radius:var(--radius);background:var(--accent-bg);border:1px solid var(--accent)"><div><div style="font-size:12px;color:var(--accent);font-weight:600;text-transform:uppercase">Total à commander</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${totalQty} articles</div></div><div style="font-family:var(--font-mono);font-size:22px;font-weight:700;color:var(--accent)">${$(totalCost)}</div></div>
`});
};
window.showTransfer=(pat)=>{const inact=S.members.filter(m=>!m.year||m.year!==S.year);set({modal:`<h3>Transférer vers ${E(pat)}</h3>${inact.length===0?'<p style="color:var(--text3);font-size:13px">Aucun scout inactif.</p>':''}${inact.map(m=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-light)"><span style="flex:1;font-size:13px;font-weight:500">${E(m.prenom)} ${E(m.nom)}</span><button class="btn btn-sm" style="background:var(--accent-bg);color:var(--accent);padding:4px 12px" onclick="transfer('${m.rid}','${E(pat)}')">→ ${E(pat)}</button></div>`).join('')}`})};
window.showAddMember=()=>{const cfgPats=S.cfgData.filter(c=>c.type==='Patrouille');const allPats=[...new Set([...PATROUILLES,...cfgPats.map(c=>c.nom)])];set({modal:`<h3>👤 Nouveau scout</h3><div class="form-group"><label>Prénom</label><input id="nm-prenom" placeholder="Prénom"></div><div class="form-group"><label>Nom</label><input id="nm-nom" placeholder="Nom de famille"></div><div class="form-group"><label>Patrouille</label><select id="nm-pat">${allPats.map(p=>`<option value="${E(p)}">${PAT_ICONS[p]||'⚜'} ${E(p)}</option>`).join('')}</select></div><button class="btn btn-primary" style="width:100%;justify-content:center" onclick="addNewMember(document.getElementById('nm-prenom').value,document.getElementById('nm-nom').value,document.getElementById('nm-pat').value)">Ajouter le scout</button>`})};
window.showTroupeConfig=()=>{const maitrise=S.cfgData.filter(c=>c.type==='Chef'||c.type==='Assistant'||c.type==='Aumonier');const pats=S.cfgData.filter(c=>c.type==='Patrouille');
set({modal:`<h3>⚜ Configuration de la troupe</h3>
<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:8px">👑 Maîtrise</div>
${maitrise.map(m=>{const tC=m.type==='Chef'?'var(--danger)':m.type==='Aumonier'?'var(--purple)':'var(--warn)';return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-light)"><span class="pill" style="background:${tC}15;color:${tC}">${E(m.type)}</span><span style="flex:1;font-weight:500;font-size:13px">${E(m.nom)}</span><span style="color:var(--danger);cursor:pointer;font-size:14px" onclick="removeCfgEntry('${m.rid}')">×</span></div>`}).join('')}
<div style="display:flex;gap:6px;margin-top:8px"><select id="cfg-mtype" style="padding:6px 10px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text);font-family:var(--font)"><option value="Chef">Chef</option><option value="Assistant">Assistant</option><option value="Aumonier">Aumônier</option></select><input id="cfg-mname" placeholder="Nom complet" style="flex:1;padding:6px 10px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text);font-family:var(--font)"><button class="btn btn-sm" style="background:var(--accent-bg);color:var(--accent)" onclick="const n=document.getElementById('cfg-mname').value,t=document.getElementById('cfg-mtype').value;addCfgEntry(n,t)">+</button></div></div>
<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;margin-bottom:8px">🏕 Patrouilles</div>
${pats.map(p=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-light)"><span style="font-size:16px">${PAT_ICONS[p.nom]||'⚜'}</span><span style="flex:1;font-weight:500;font-size:13px">${E(p.nom)}</span><span style="color:var(--danger);cursor:pointer;font-size:14px" onclick="if(confirm('Supprimer la patrouille ${E(p.nom)}?'))removeCfgEntry('${p.rid}')">×</span></div>`).join('')}
<div style="display:flex;gap:6px;margin-top:8px"><input id="cfg-pname" placeholder="Nom de la patrouille" style="flex:1;padding:6px 10px;font-size:12px;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text);font-family:var(--font)"><button class="btn btn-sm" style="background:var(--accent-bg);color:var(--accent)" onclick="const n=document.getElementById('cfg-pname').value;addCfgEntry(n,'Patrouille')">+</button></div></div>
`})};
window.addNewMember=addNewMember;window.addCfgEntry=addCfgEntry;window.removeCfgEntry=removeCfgEntry;

// ═══════════ INIT ═══════════
(async function(){
  if(S.token&&restoreConfig()){
    set({loading:true,statusMsg:'Reconnexion...',screen:'setup'});
    try{await loadMembers();if(S.year)set({screen:'home',loading:false,statusMsg:null});else set({screen:'year_select',loading:false,statusMsg:null})}
    catch(e){localStorage.removeItem('scout_cfg2');set({loading:false,statusMsg:null,error:'Session expirée — reconnectez-vous.',screen:'setup'})}
  }else render();
})();
</script>
</body>
</html>
